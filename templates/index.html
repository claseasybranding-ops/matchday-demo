<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ o.gruppe }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .match-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .team-logo { width: 40px; height: 40px; object-fit: contain; }
        .team-name { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; margin-top: 5px; }
        .score-val { font-size: 1.5rem; font-weight: 800; min-width: 30px; text-align: center; }
        .btn-qty { border: 1px solid #ddd; background: white; color: #d62828; width: 35px; height: 35px; border-radius: 8px; font-weight: bold; }
        .extra-box { background: #fff5f5; border: 1px dashed #d62828; border-radius: 15px; padding: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px; padding-top: 20px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold m-0">MatchDay<span>.</span></h2>
        <p class="text-muted fw-bold">{{ o.gruppe }}</p>
    </div>

    <input type="text" id="navn" class="form-control mb-3 p-3" placeholder="Ditt navn..." style="border-radius: 12px;">

    {% for k in o.kamper %}
    <div class="match-card">
        <div class="row align-items-center g-0 text-center">
            <div class="col-3">
                <img src="{{ k.h_logo }}" class="team-logo">
                <div class="team-name">{{ k.h_navn }}</div>
            </div>
            <div class="col-6">
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <button class="btn-qty" onclick="e('h{{loop.index}}',-1)">-</button>
                    <span class="score-val" id="h{{loop.index}}">0</span>
                    <button class="btn-qty" onclick="e('h{{loop.index}}',1)">+</button>
                </div>
                <div class="d-flex align-items-center justify-content-center gap-2 mt-2">
                    <button class="btn-qty" onclick="e('b{{loop.index}}',-1)">-</button>
                    <span class="score-val" id="b{{loop.index}}">0</span>
                    <button class="btn-qty" onclick="e('b{{loop.index}}',1)">+</button>
                </div>
            </div>
            <div class="col-3">
                <img src="{{ k.b_logo }}" class="team-logo">
                <div class="team-name">{{ k.b_navn }}</div>
            </div>
        </div>
    </div>
    {% endfor %}

    {% if o.modus == 'singel' %}
    <div class="extra-box">
        <label class="small fw-bold text-danger">ADDITIONAL PREDICTIONS</label>
        <input type="text" class="form-control mb-2 mt-1" placeholder="Første målscorer...">
        <input type="number" class="form-control" placeholder="Minutt første mål...">
    </div>
    {% endif %}

    <button class="btn btn-danger w-100 p-3 fw-bold shadow mt-3" style="border-radius: 15px;">LÅS TIPS ⚽</button>
</div>

<script>
    function e(id,v){
        let el=document.getElementById(id);
        let n=parseInt(el.innerText)+v;
        if(n>=0) el.innerText=n;
    }
</script>

</body>
</html>
