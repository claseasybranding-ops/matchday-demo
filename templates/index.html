<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | Profesjonell Konkurranseplattform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; }
        body { background-color: var(--md-dark); color: white; font-family: 'Inter', sans-serif; }
        .hero-section { padding: 100px 0; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1350&q=80'); background-size: cover; }
        .btn-primary { background-color: var(--md-red); border: none; padding: 12px 30px; font-weight: bold; }
        .card { background: #2a2a2a; border: none; color: white; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold">MatchDay</h1>
            <p class="lead">Den ultimate plattformen for sportskonkurranser og bedriftsligaer.</p>
            <div class="mt-4">
                <a href="/group/demo-gruppe" class="btn btn-primary btn-lg">Prøv Demo-Konkurranse</a>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <h2 class="text-center mb-5">Topp Konkurranser (Modul 8)</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Bedriftsligaen 2026</h3>
                    <p>Sponset av Marine AS</p>
                    <span class="badge bg-danger w-25">LIVE</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Venneligaen</h3>
                    <p>Privat gruppe</p>
                    <span class="text-muted small">12 deltakere</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Champions League Mix</h3>
                    <p>Åpen for alle</p>
                    <span class="badge bg-success w-25">ÅPEN</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
