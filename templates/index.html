<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Fredrikstad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; color: #333; font-family: sans-serif; }
        .match-card { 
            background: white; border-radius: 20px; padding: 15px; 
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .team-container { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }
        .team-name { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; text-align: center; line-height: 1.1; }
        
        .score-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 2px 0; }
        .btn-qty { 
            border: 1px solid #ddd; background: #fff; color: #d62828; 
            width: 32px; height: 32px; border-radius: 8px; font-weight: bold; 
        }
        .score-val { font-size: 1.4rem; font-weight: 800; min-width: 25px; text-align: center; }

        .header { padding: 25px 0 10px 0; text-align: center; }
        .logo { font-size: 2rem; font-weight: 900; }
        .logo span { color: #d62828; }
        .btn-send { background: #d62828; color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 450px;">
    <div class="header">
        <div class="logo">MatchDay<span>.</span></div>
        <p class="text-muted small fw-bold">GUTTENE I FREDRIKSTAD</p>
    </div>

    <input type="text" id="brukerNavn" class="form-control mb-3 p-3" placeholder="Ditt navn..." style="border-radius: 12px; border: 2px solid #eee;">

    {% for k in kamper %}
    <div class="match-card">
        <div class="row align-items-center g-0">
            <div class="col-3 team-container">
                <img src="{{ k.h_logo }}" class="team-logo">
                <div class="team-name">{{ k.h_navn }}</div>
            </div>
            
            <div class="col-6">
                <div class="score-row">
                    <button class="btn-qty" onclick="endre('h{{ k.id }}', -1)">-</button>
                    <span class="score-val" id="h{{ k.id }}">0</span>
                    <button class="btn-qty" onclick="endre('h{{ k.id }}', 1)">+</button>
                </div>
                <div class="score-row">
                    <button class="btn-qty" onclick="endre('b{{ k.id }}', -1)">-</button>
                    <span class="score-val" id="b{{ k.id }}">0</span>
                    <button class="btn-qty" onclick="endre('b{{ k.id }}', 1)">+</button>
                </div>
            </div>

            <div class="col-3 team-container">
                <img src="{{ k.b_logo }}" class="team-logo">
                <div class="team-name">{{ k.b_navn }}</div>
            </div>
        </div>
    </div>
    {% endfor %}

    <button class="btn-send shadow" onclick="sendTips()">LÅS TIPS ⚽</button>
</div>

<script>
    function endre(id, verdi) {
        let el = document.getElementById(id);
        let ny = parseInt(el.innerText) + verdi;
        if(ny >= 0) el.innerText = ny;
    }
    function sendTips() {
        const navn = document.getElementById('brukerNavn').value;
        if(!navn) { alert('Skriv navnet!'); return; }
        alert('Tips for begge kamper er lagret!');
    }
</script>

</body>
</html>
