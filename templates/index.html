<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Fredrikstad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .match-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; margin-top: 20px; }
        .score { font-size: 3rem; font-weight: bold; color: #d62828; }
        .btn-primary { background: #d62828; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h2 class="mt-4 fw-bold">Guttene i Fredrikstad</h2>
        <p class="text-muted">Singelkamp-utfordring</p>

        <div class="match-card mx-auto" style="max-width: 500px;">
            <div class="row align-items-center">
                <div class="col"><h5>{{ s.h_navn }}</h5></div>
                <div class="col"><span class="score">{{ s.h_score }} - {{ s.b_score }}</span></div>
                <div class="col"><h5>{{ s.b_navn }}</h5></div>
            </div>
            <div class="badge bg-danger mt-2">{{ s.minutt }}</div>
            <p class="mt-3"><strong>Hendelse:</strong> {{ s.hendelse }}</p>
        </div>

        <div class="mt-4 mx-auto" style="max-width: 400px;">
            <input type="text" id="navn" class="form-control mb-2" placeholder="Ditt navn">
            <div class="row mb-2">
                <div class="col"><input type="number" id="h_tips" class="form-control" placeholder="{{ s.h_navn }}"></div>
                <div class="col"><input type="number" id="b_tips" class="form-control" placeholder="{{ s.b_navn }}"></div>
            </div>
            <input type="number" id="gg" class="form-control mb-3" placeholder="Første mål (minutt)">
            <button onclick="sendTips()" class="btn btn-primary w-100">LÅS TIPS & SE TABELL ⚽</button>
        </div>
    </div>

    <script>
        function sendTips() {
            const data = {
                navn: document.getElementById('navn').value,
                h: document.getElementById('h_tips').value,
                b: document.getElementById('b_tips').value,
                gg: document.getElementById('gg').value
            };
            fetch('/send_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => alert('Tips lagret! Lykke til!'));
        }
    </script>
</body>
</html>
