<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Fredrikstad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .match-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; margin-top: 20px; border-bottom: 5px solid #d62828; }
        .team-name { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        .score-box { background: #f8f9fa; border-radius: 10px; padding: 10px 20px; font-size: 2.5rem; font-weight: 800; color: #d62828; min-width: 120px; display: inline-block; }
        .minute-badge { background: #d62828; color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .btn-action { background: #d62828; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-action:hover { background: #a51d1d; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container text-center mb-5">
        <h2 class="mt-5 fw-bold text-dark">GUTTENE I FREDRIKSTAD</h2>
        <p class="text-muted mb-4">Eksklusiv Tippekonkurranse</p>

        <div class="match-container mx-auto" style="max-width: 600px;">
            <div class="minute-badge">{{ s.minutt }}</div>
            <div class="d-flex justify-content-between align-items-center">
                <div style="flex: 1;" class="team-name">{{ s.h_navn }}</div>
                <div style="flex: 0 0 auto;" class="score-box mx-3">{{ s.h_score }} - {{ s.b_score }}</div>
                <div style="flex: 1;" class="team-name">{{ s.b_navn }}</div>
            </div>
            <p class="mt-4 text-secondary italic"><strong>Status:</strong> {{ s.hendelse }}</p>
        </div>

        <div class="mt-4 mx-auto" style="max-width: 450px;">
            <div class="card p-4 border-0 shadow-sm" style="border-radius: 20px;">
                <input type="text" id="navn" class="form-control mb-3" placeholder="Ditt kallenavn">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="small fw-bold text-muted">{{ s.h_navn }}</label>
                        <input type="number" id="h_tips" class="form-control text-center" placeholder="Mål">
                    </div>
                    <div class="col-6">
                        <label class="small fw-bold text-muted">{{ s.b_navn }}</label>
                        <input type="number" id="b_tips" class="form-control text-center" placeholder="Mål">
                    </div>
                </div>
                <label class="small fw-bold text-muted">Første målminutt (Tie-break)</label>
                <input type="number" id="gg" class="form-control mb-4 text-center" placeholder="Minutt">
                <button onclick="sendTips()" class="btn btn-action w-100 shadow">LÅS TIPS & SE TABELL ⚽</button>
            </div>
        </div>
    </div>

    <script>
        function sendTips() {
            const data = {
                navn: document.getElementById('navn').value,
                h: document.getElementById('h_tips').value,
                b: document.getElementById('b_tips').value,
                gg: document.getElementById('gg').value
            };
            if(!data.navn) { alert('Du må skrive navnet ditt!'); return; }
            fetch('/send_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => {
                alert('Takk, ' + data.navn + '! Ditt tips er registrert.');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
