<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .admin-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .fw-800 { font-weight: 800; }
        
        .btn-save { 
            background: #000; color: white; border: none; padding: 15px; 
            border-radius: 15px; width: 100%; font-weight: 800; transition: 0.3s;
        }
        .btn-save.success { background: #28a745 !important; }
        
        /* Den nye "Gå til tippeside"-knappen som dukker opp */
        #go-to-view { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .match-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .match-item:last-child { border: none; }
        .match-check { width: 22px; height: 22px; margin-right: 15px; accent-color: #cc0000; }
        
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-view-site { background: #eee; color: #333; text-decoration: none; padding: 8px 15px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container mt-4" style="max-width: 500px;">
        <div class="nav-top">
            <h4 class="fw-800 m-0">Admin Panel</h4>
            <a href="/group/{{ group[2] }}" class="btn-view-site">SE TIPPESIDE 👁️</a>
        </div>

        <div class="admin-card">
            <label class="fw-800 small text-muted text-uppercase mb-2">Rundens Premie</label>
            <input type="text" id="prize" class="form-control mb-3" value="{{ group[5] or '' }}" placeholder="Eks: En kald pils...">
            
            <label class="fw-800 small text-muted text-uppercase mb-2">Spilltype</label>
            <select id="mode" class="form-select mb-3">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Vanlig Runde (Flere kamper)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>MatchDay (1 kamp + GG)</option>
            </select>
        </div>

        <div class="admin-card">
            <label class="fw-800 small text-muted text-uppercase mb-3 d-block">Velg kamper til runden</label>
            {% for k in kamper %}
            <div class="match-item">
                <input type="checkbox" class="match-check" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %}>
                <div class="small">
                    <span class="fw-800">{{ k[2] }} - {{ k[3] }}</span><br>
                    <span class="text-muted">{{ k[6] }}</span>
                </div>
            </div>
            {% endfor %}
        </div>

        <button id="save-btn" class="btn-save shadow-sm" onclick="saveSettings()">LAGRE KAMPVALG 💾</button>
        
        <div id="go-to-view" class="mt-3 text-center">
            <p class="small fw-bold text-success mb-2">Alt er klart!</p>
            <a href="/group/{{ group[2] }}" class="btn btn-primary w-100" style="border-radius: 15px; padding: 12px; font-weight: 800; background: #007bff;">
                GÅ TIL TIPPESIDEN NÅ 🚀
            </a>
        </div>
    </div>

    <script>
        async function saveSettings() {
            const btn = document.getElementById('save-btn');
            const followUp = document.getElementById('go-to-view');
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));
            
            const response = await fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id_str: '{{ group[2] }}',
                    mode: document.getElementById('mode').value,
                    prize: document.getElementById('prize').value,
                    matches: matches
                })
            });

            if (response.ok) {
                // Gjør lagre-knappen grønn
                btn.innerText = "LAGRET! ✅";
                btn.classList.add('success');
                
                // Vis den store blå knappen som leder til tippesiden
                followUp.style.display = 'block';

                // Etter 3 sekunder endrer vi lagre-knappen tilbake, men beholder "gå til"-knappen
                setTimeout(() => {
                    btn.innerText = "OPPDATER VALG 💾";
                    btn.classList.remove('success');
                }, 3000);
            }
        }
    </script>
</body>
</html>
