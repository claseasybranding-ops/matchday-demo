<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; }
        .admin-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        .match-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-save { background: var(--md-red); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="fw-800 mb-4">Administrer {{ group[1] }}</h2>
        
        <div class="mb-4">
            <label class="fw-bold small text-uppercase">Spillmodus</label>
            <select id="group-mode" class="form-select mt-1">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Multi Game (Mange kamper)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>Single Game (Fokus på én kamp)</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase">Premieinfo</label>
            <input type="text" id="prize-info" class="form-control mt-1" value="{{ group[5] or '' }}" placeholder="F.eks: En valgfri pizza">
        </div>

        <label class="fw-bold small text-uppercase mb-2">Velg kamper for denne runden</label>
        <div style="max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; padding: 10px;">
            {% for k in kamper %}
            <div class="match-row">
                <input type="checkbox" class="match-check me-3" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %}>
                <div class="small">
                    <strong>{{ k[2] }} - {{ k[3] }}</strong><br>
                    <span class="text-muted">{{ k[6] }}</span>
                </div>
            </div>
            {% endfor %}
        </div>

        <button class="btn-save" onclick="saveSettings()">Lagre endringer 💾</button>
        <a href="/group/{{ group[2] }}/leaderboard" class="btn btn-link w-100 text-muted mt-2">Tilbake til tabell</a>
    </div>

    <script>
        function saveSettings() {
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));
            
            fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id_str: '{{ group[2] }}',
                    mode: document.getElementById('group-mode').value,
                    prize: document.getElementById('prize-info').value,
                    matches: matches
                })
            }).then(() => alert("Lagret!"));
        }
    </script>
</body>
</html>
