<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .admin-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        .share-box { background: #fff5f5; border: 2px dashed var(--md-red); padding: 15px; border-radius: 16px; margin-bottom: 25px; text-align: center; }
        .share-url { font-weight: 800; color: var(--md-red); font-size: 0.9rem; word-break: break-all; display: block; margin-top: 5px; }
        .match-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .smart-btn { background: #f1f1f1; border: none; padding: 8px 12px; border-radius: 10px; font-weight: 700; margin: 5px 2px; font-size: 0.75rem; }
        .btn-save { background: var(--md-red); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .btn-view { background: var(--md-dark); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 10px; text-transform: uppercase; text-decoration: none; display: block; text-align: center; }
        .match-list { max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="fw-800 mb-2 text-center">Oppsett: {{ group[1] }}</h2>
        
        <div class="share-box">
            <span class="small fw-bold text-muted text-uppercase">Link til deltakerne:</span>
            <span class="share-url" id="group-url">matchday-demo.onrender.com/group/{{ group[2] }}</span>
            <button class="btn btn-sm btn-outline-danger mt-2 fw-bold" onclick="copyUrl()">Kopier link 📋</button>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Spillmodus</label>
            <select id="mode" class="form-select fw-bold" onchange="toggleView()">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Multi Game (Flere kamper)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>Single Game (Supporter-modus)</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Premie i denne runden</label>
            <input type="text" id="prize" class="form-control fw-bold" value="{{ group[5] or '' }}" placeholder="F.eks: En signert drakt">
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Velg kamper</label>
            <div class="match-list">
                {% for k in kamper %}
                <div class="match-row">
                    <input type="checkbox" class="match-check me-2" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %}>
                    <span class="small fw-bold">{{ k[2] }} - {{ k[3] }}</span>
                </div>
                {% endfor %}
            </div>
        </div>

        <div id="single-extras" style="display: {% if group[4] == 'single' %}block{% else %}none{% endif %}; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 2px dashed #eee;">
            <label class="fw-bold small text-uppercase text-muted d-block mb-2 text-center">TIE-BREAKERS (KUN SINGLE GAME)</label>
            <div class="text-center">
                <button class="smart-btn" onclick="saveAndAddQ('Blir det straffespark?')">+ Straffe?</button>
                <button class="smart-btn" onclick="saveAndAddQ('Blir det rødt kort?')">+ Rødt kort?</button>
            </div>
            
            <div class="mt-3">
                {% if players %}
                <select id="player-select" class="form-select form-select-sm mb-2">
                    <option value="">Velg en spiller...</option>
                    {% for p in players %}<option value="Scorer {{ p.name }} ({{ p.team }})?">{{ p.name }} ({{ p.team }})</option>{% endfor %}
                </select>
                {% else %}
                <input type="text" id="player-manual" class="form-control form-select-sm mb-2" placeholder="Skriv spillerens navn (f.eks Salah)">
                {% endif %}
                <button class="btn btn-sm btn-dark w-100 fw-bold" onclick="addPlayerQ()">LEGG TIL SPILLER-MÅL</button>
            </div>
            
            <div id="q-list" class="mt-2 text-center">
                {% for q in questions %}
                <div class="small fw-bold text-success">✓ {{ q[1] }}</div>
                {% endfor %}
            </div>
        </div>

        <button class="btn-save shadow" onclick="saveAll(true)">LAGRE ALT 💾</button>
        <a href="/group/{{ group[2] }}" class="btn-view shadow">GÅ TIL TIPPESIDEN ⚽</a>
    </div>

    <script>
        function toggleView() {
            const mode = document.getElementById('mode').value;
            document.getElementById('single-extras').style.display = (mode === 'single') ? 'block' : 'none';
        }

        function copyUrl() {
            const url = document.getElementById('group-url').innerText;
            navigator.clipboard.writeText(url);
            alert("Link kopiert!");
        }

        async function saveAll(showAlert = false) {
            const mode = document.getElementById('mode').value;
            const prize = document.getElementById('prize').value;
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));

            const response = await fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id_str: '{{ group[2] }}', mode: mode, prize: prize, matches: matches })
            });

            if (showAlert) alert("Alt er lagret!");
            return response;
        }

        function addPlayerQ() {
            const select = document.getElementById('player-select');
            const manual = document.getElementById('player-manual');
            let qText = "";
            
            if (select) {
                if(!select.value) return alert("Velg en spiller!");
                qText = select.value;
            } else if (manual) {
                if(!manual.value) return alert("Skriv et navn!");
                qText = "Scorer " + manual.value + "?";
            }
            
            saveAndAddQ(qText);
        }

        async function saveAndAddQ(text) {
            if(!text || text.trim() === "") return;
            
            await saveAll(false);
            const mid = document.querySelector('.match-check:checked')?.value;
            if(!mid) return alert("Velg en kamp først!");
            
            await fetch('/api/add_smart_question', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id_str: '{{ group[2] }}', match_id: mid, text: text })
            });
            window.location.reload();
        }
    </script>
</body>
</html>
