<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .mode-btn { padding: 20px; cursor: pointer; border: 2px solid #ddd; border-radius: 10px; transition: 0.3s; }
        .active-mode { border-color: #cc0000; background: #fff5f5; }
        .match-card { background: white; padding: 10px; border-bottom: 1px solid #eee; }
        .is-selected { background: #e8f5e9; }
    </style>
</head>
<body class="p-4">
    <div class="container" style="max-width: 600px;">
        <h2 class="fw-bold">{{ group[1] }} Admin</h2>
        
        <div class="row g-2 my-4">
            <div class="col-6 text-center mode-btn {% if group[4] == 'multi' %}active-mode{% endif %}" onclick="setM('multi')">
                <strong>Multi-game</strong><br><small>Rundens kamper</small>
            </div>
            <div class="col-6 text-center mode-btn {% if group[4] == 'single' %}active-mode{% endif %}" onclick="setM('single')">
                <strong>Single-game</strong><br><small>Én storkamp</small>
            </div>
        </div>

        <div class="card p-3 shadow-sm">
            {% for m in all_fixtures %}
            <div class="match-card d-flex justify-content-between align-items-center {% if m[0] in selected_ids %}is-selected{% endif %}">
                <span class="small">{{ m[2] }} - {{ m[3] }}</span>
                <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-dark{% endif %}" onclick="toggleM('{{ m[0] }}')">
                    {% if m[0] in selected_ids %}Valgt{% else %}Velg{% endif %}
                </button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function setM(m) {
            fetch('/api/set_mode', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({group_id: '{{ group[0] }}', mode: m}) })
            .then(() => location.reload());
        }
        function toggleM(fid) {
            fetch('/api/toggle_match', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({group_id: '{{ group[0] }}', fixture_id: fid}) })
            .then(() => location.reload());
        }
    </script>
</body>
</html>
