<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f3f4f6; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; }
        .card-custom { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e7eb; }
        .btn-main { background: var(--md-red); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; }
        .mode-card { border: 2px solid #e5e7eb; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 700; }
        .mode-card.active { border-color: var(--md-red); background: #fff1f2; color: var(--md-red); }
    </style>
</head>
<body>

<div class="container mt-4" style="max-width: 500px;">
    <h2 class="fw-bold mb-4">Kontrollpanel: {{ group[1] }}</h2>

    <div class="card-custom">
        <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Runde-innstillinger</label>
        <input type="text" id="prize-input" class="form-control mb-3" placeholder="Premie (f.eks Pizza)" value="{{ group[5] or '' }}">
        
        <div class="row g-2 mb-3">
            <div class="col-6"><div id="m-multi" class="mode-card active">RUNDE</div></div>
            <div class="col-6"><div id="m-single" class="mode-card">STORKAMP</div></div>
        </div>
        <button class="btn btn-dark w-100 fw-bold" onclick="saveSettings()">LAGRE INNSTILLINGER</button>
    </div>

    <div class="card-custom">
        <label class="small fw-bold text-muted text-uppercase mb-3 d-block">Velg kamper</label>
        {% for m in all_fixtures %}
        <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
            <span class="small fw-bold">{{ m[2] }} - {{ m[3] }}</span>
            <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-secondary{% endif %}" onclick="toggleMatch('{{ m[0] }}')">
                {% if m[0] in selected_ids %}VALGT{% else %}VELG{% endif %}
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    function saveSettings() {
        const prize = document.getElementById('prize-input').value;
        fetch('/api/update_group_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                group_id: {{ group[0] }},
                mode: 'multi',
                prize_info: prize
            })
        }).then(() => alert("Innstillinger lagret!"));
    }

    function toggleMatch(fid) {
        // Lagre premien samtidig som vi toggler kamp, så ingenting forsvinner
        const prize = document.getElementById('prize-input').value;
        fetch('/api/update_group_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ group_id: {{ group[0] }}, mode: 'multi', prize_info: prize })
        }).then(() => {
            fetch('/api/toggle_match', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id: {{ group[0] }}, fixture_id: fid })
            }).then(() => location.reload());
        });
    }
</script>
</body>
</html>
