<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f9; padding-bottom: 50px; }
        .admin-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .mode-btn { border: 2px solid #ddd; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: bold; }
        .active-mode { border-color: #cc0000; background: #fff5f5; color: #cc0000; }
        .match-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .selected { background: #e8f5e9; }
    </style>
</head>
<body class="container py-4">
    <h4 class="fw-bold mb-3">Admin: {{ group[1] }}</h4>

    <div class="admin-card">
        <label class="small fw-bold text-muted">HVA ER PREMIEN?</label>
        <input type="text" id="prize" class="form-control mb-3" placeholder="F.eks. En stor pizza eller heder og gloria" value="{{ group[5] or '' }}">
        
        <label class="small fw-bold text-muted">VELG MODUS:</label>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <div id="btn-multi" class="mode-btn {% if group[4] == 'multi' %}active-mode{% endif %}" onclick="updateSettings('multi')">Runde (Multi)</div>
            </div>
            <div class="col-6">
                <div id="btn-single" class="mode-btn {% if group[4] == 'single' %}active-mode{% endif %}" onclick="updateSettings('single')">Storkamp (Single)</div>
            </div>
        </div>
        <button class="btn btn-dark btn-sm w-100" onclick="updateSettings('{{ group[4] }}')">Lagre innstillinger</button>
    </div>

    <div class="admin-card p-0 overflow-hidden">
        <div class="p-3 border-bottom fw-bold bg-light">Velg kamp(er):</div>
        {% for m in all_fixtures %}
        <div class="match-item {% if m[0] in selected_ids %}selected{% endif %}">
            <span class="small">{{ m[2] }} - {{ m[3] }}</span>
            <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-dark{% endif %}" onclick="toggleM('{{ m[0] }}')">
                {% if m[0] in selected_ids %}Valgt{% else %}Velg{% endif %}
            </button>
        </div>
        {% endfor %}
    </div>

    <div class="fixed-bottom p-3 bg-white border-top shadow text-center">
        <a href="/group/{{ group[2] }}" target="_blank" class="btn btn-danger fw-bold w-100">SE LIVE KUPONG</a>
    </div>

    <script>
        function updateSettings(mode) {
            const prize = document.getElementById('prize').value;
            fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group_id: '{{ group[0] }}', mode: mode, prize_info: prize})
            }).then(() => location.reload());
        }
        function toggleM(fid) {
            fetch('/api/toggle_match', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group_id: '{{ group[0] }}', fixture_id: fid})
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
