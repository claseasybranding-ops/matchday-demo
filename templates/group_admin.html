<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .selected { background: #d4edda; border-color: #28a745; }
        .mode-box { padding: 20px; border: 2px solid #ddd; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .mode-active { border-color: #cc0000; background: #fff5f5; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 700px;">
        <h2 class="fw-bold">{{ group[1] }} - Admin</h2>
        
        <div class="row g-3 my-4">
            <div class="col-6">
                <div class="mode-box text-center {% if group[4] == 'multi' %}mode-active{% endif %}" onclick="setMode('multi')">
                    <h5 class="fw-bold">Multi-game</h5>
                    <small>Hele runden (10 kamper)</small>
                </div>
            </div>
            <div class="col-6">
                <div class="mode-box text-center {% if group[4] == 'single' %}mode-active{% endif %}" onclick="setMode('single')">
                    <h5 class="fw-bold">Single-game</h5>
                    <small>Én utvalgt storkamp</small>
                </div>
            </div>
        </div>

        <div class="card p-3 shadow-sm">
            <h6 class="fw-bold mb-3">Velg {% if group[4] == 'single' %}kampen{% else %}kampene{% endif %}:</h6>
            {% for m in all_fixtures %}
            <div class="d-flex justify-content-between align-items-center border-bottom py-2 {% if m[0] in selected_ids %}selected{% endif %}">
                <span>{{ m[2] }} vs {{ m[3] }}</span>
                <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-dark{% endif %}" onclick="toggleMatch('{{ m[0] }}')">
                    {% if m[0] in selected_ids %}Valgt{% else %}Velg{% endif %}
                </button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function setMode(mode) {
            fetch('/api/set_mode', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({group_id: '{{ group[0] }}', mode: mode}) })
            .then(() => location.reload());
        }
        function toggleMatch(fid) {
            fetch('/api/toggle_match', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({group_id: '{{ group[0] }}', fixture_id: fid}) })
            .then(() => location.reload());
        }
    </script>
</body>
</html>
