<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin: {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .match-row { 
            background: white; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 10px; 
            border: 1px solid #ddd;
            transition: 0.3s;
        }
        .is-selected { border-left: 8px solid #198754; background-color: #f0fff4; }
        .is-single { border-right: 8px solid #dc3545; }
        .btn-toggle { min-width: 100px; }
        .logo-sm { width: 30px; height: 30px; object-fit: contain; margin: 0 5px; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold h2 mb-1">{{ group[1] }}</h1>
            <p class="text-muted">Admin-panel for gruppeleder ({{ group[3] }})</p>
        </div>
        <a href="/group/{{ group[2] }}" target="_blank" class="btn btn-danger fw-bold">Se Live Kupong</a>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <h5 class="fw-bold mb-4">Velg kamper og sett status:</h5>
        
        <div id="fixture-list">
            {% for m in all_fixtures %}
            <div class="match-row d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="me-3 text-muted small">{{ m[6][:10] }}</div>
                    <div class="fw-bold">
                        <img src="{{ m[4] }}" class="logo-sm"> {{ m[2] }}
                        <span class="mx-1">-</span>
                        {{ m[3] }} <img src="{{ m[5] }}" class="logo-sm">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-secondary{% endif %} btn-toggle" 
                            onclick="toggleMatch('{{ group[0] }}', '{{ m[0] }}')">
                        {% if m[0] in selected_ids %}Valgt{% else %}Legg til{% endif %}
                    </button>

                    {% if m[0] in selected_ids %}
                    <button class="btn btn-sm btn-outline-danger" 
                            onclick="toggleSingle('{{ group[0] }}', '{{ m[0] }}')">
                        ⭐ Hovedkamp
                    </button>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <div class="mt-4 text-center">
        <a href="/" class="text-decoration-none text-muted small">← Tilbake til System-Admin</a>
    </div>
</div>

<script>
    function toggleMatch(groupId, fixtureId) {
        fetch('/api/toggle_match', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({group_id: groupId, fixture_id: fixtureId})
        })
        .then(res => res.json())
        .then(data => {
            location.reload();
        });
    }

    function toggleSingle(groupId, fixtureId) {
        fetch('/api/toggle_single_game', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({group_id: groupId, fixture_id: fixtureId})
        })
        .then(res => res.json())
        .then(data => {
            location.reload();
        });
    }
</script>

</body>
</html>
