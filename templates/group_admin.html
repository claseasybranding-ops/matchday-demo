<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f3f4f6; }
        body { background-color: var(--md-bg); font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .card-custom { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e7eb; }
        .match-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .team-logo { width: 25px; height: 25px; object-fit: contain; margin: 0 5px; }
        .btn-main { background: var(--md-red); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; text-transform: uppercase; }
        .fixed-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container mt-4" style="max-width: 500px;">
    <h3 class="fw-bold mb-4">Kontrollpanel: {{ group[1] }}</h3>

    <div class="card-custom">
        <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Runde-innstillinger</label>
        <input type="text" id="prize-input" class="form-control mb-3" placeholder="Hva er premien?" value="{{ group[5] or '' }}">
        <button class="btn btn-dark w-100 fw-bold" onclick="saveSettings()">LAGRE INNSTILLINGER</button>
    </div>

    <div class="card-custom">
        <label class="small fw-bold text-muted text-uppercase mb-3 d-block">Velg kamper</label>
        {% for m in all_fixtures %}
        <div class="match-row">
            <div class="d-flex align-items-center">
                <img src="{{ m[4] }}" class="team-logo">
                <span class="small fw-bold">{{ m[2] }} - {{ m[3] }}</span>
                <img src="{{ m[5] }}" class="team-logo">
            </div>
            <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-secondary{% endif %}" onclick="toggleMatch('{{ m[0] }}')">
                {% if m[0] in selected_ids %}VALGT{% else %}VELG{% endif %}
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<div class="fixed-bottom-nav">
    <div class="container" style="max-width: 500px;">
        <a href="/group/{{ group[2] }}" class="btn-main d-block text-center text-decoration-none">GÅ TIL KONKURRANSE</a>
    </div>
</div>

<script>
    function saveSettings() {
        fetch('/api/update_group_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                group_id: {{ group[0] }},
                mode: 'multi',
                prize_info: document.getElementById('prize-input').value
            })
        }).then(() => alert("Lagret!"));
    }

    function toggleMatch(fid) {
        fetch('/api/toggle_match', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ group_id: {{ group[0] }}, fixture_id: fid })
        }).then(() => location.reload());
    }
</script>
</body>
</html>
