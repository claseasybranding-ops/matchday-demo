<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; --md-blue: #0066ff; --md-cl: #003399; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .admin-card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .fw-800 { font-weight: 800; }
        .btn-save { background: #000; color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 800; transition: 0.3s; }
        .btn-save.success { background: #28a745 !important; }
        .import-btn-pl { background: #28a745; color: white; border: none; padding: 10px; border-radius: 12px; font-weight: 800; font-size: 0.7rem; width: 48%; }
        .import-btn-cl { background: var(--md-cl); color: white; border: none; padding: 10px; border-radius: 12px; font-weight: 800; font-size: 0.7rem; width: 48%; }
        #go-to-view { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .match-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .match-check { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--md-red); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .btn-view-site { background: white; color: #333; text-decoration: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .q-item { background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 8px; }
        .btn-delete-q { color: #dc3545; border: none; background: none; font-weight: 800; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="nav-top">
            <h4 class="fw-800 m-0">Admin: {{ group[1] }}</h4>
            <a href="/group/{{ group[2] }}" class="btn-view-site">SE TIPPESIDE 👁️</a>
        </div>

        <div class="admin-card text-center">
            <label class="fw-800 small text-muted text-uppercase d-block mb-3">Hent ferske kamper</label>
            <div class="d-flex justify-content-between">
                <button class="import-btn-pl" onclick="importLeague('PL')">⚽ PREMIER LEAGUE</button>
                <button class="import-btn-cl" onclick="importLeague('CL')">⭐ CHAMPIONS LEAGUE</button>
            </div>
        </div>

        <div class="admin-card">
            <label class="fw-800 small text-muted text-uppercase mb-2">Rundens Premie</label>
            <input type="text" id="prize" class="form-control mb-4" value="{{ group[5] or '' }}" style="border-radius: 12px; padding: 12px;">
            
            <label class="fw-800 small text-muted text-uppercase mb-2">Spilltype</label>
            <select id="mode" class="form-select mb-2" style="border-radius: 12px; padding: 12px;" onchange="handleModeChange()">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Multi Game (Hele runden)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>Single Game (1 kamp + GG)</option>
            </select>
        </div>

        <div class="admin-card">
            <label class="fw-800 small text-muted text-uppercase mb-3 d-block">Velg kamper til runden</label>
            <div style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 15px; padding: 10px;">
                {% for k in kamper %}
                <div class="match-item">
                    <input type="checkbox" class="match-check" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %} onchange="checkLimit(this)">
                    <div class="small">
                        <span class="fw-800">{{ k[2] }} - {{ k[3] }}</span><br>
                        <span class="text-muted" style="font-size: 0.7rem;">{{ k[6] }}</span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <button id="save-btn" class="btn-save shadow-sm" onclick="saveSettings()">LAGRE KAMPVALG 💾</button>
        
        <div id="go-to-view" class="mt-3 text-center">
            <p class="small fw-bold text-success mb-2">Alt er lagret!</p>
            <a href="/group/{{ group[2] }}" class="btn btn-primary w-100" style="border-radius: 18px; padding: 15px; font-weight: 800; background: var(--md-blue); border: none;">
                GÅ TIL TIPPESIDEN NÅ 🚀
            </a>
        </div>

        <div class="admin-card mt-4" id="extras-section" style="display: {% if group[4] == 'single' %}block{% else %}none{% endif %};">
            <h6 class="fw-800 mb-3">Tilleggsspørsmål</h6>
            {% if players %}
            <select id="player-select" class="form-select mb-2" style="border-radius: 12px;">
                {% for p in players %}
                    <option value="Scorer {{ p.name }} ({{ p.team }})?">{{ p.name }} ({{ p.team }})</option>
                {% endfor %}
            </select>
            <button class="btn btn-dark w-100 fw-800 p-3" onclick="addSmartQ()" style="border-radius: 12px;">LEGG TIL I RUNDEN</button>
            {% endif %}
            
            <div id="q-list" class="mt-3">
                {% for q in questions %}
                    <div class="q-item">
                        <span class="small fw-800">✓ {{ q[1] }}</span>
                        <button class="btn-delete-q" onclick="deleteQuestion('{{ q[0] }}')">SLETT</button>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        function handleModeChange() {
            const mode = document.getElementById('mode').value;
            document.getElementById('extras-section').style.display = (mode === 'single') ? 'block' : 'none';
            if (mode === 'single') {
                const checked = document.querySelectorAll('.match-check:checked');
                if (checked.length > 1) {
                    checked.forEach((cb, i) => { if (i > 0) cb.checked = false; });
                }
            }
        }

        function checkLimit(cb) {
            const mode = document.getElementById('mode').value;
            if (mode === 'single' && cb.checked) {
                document.querySelectorAll('.match-check').forEach(other => {
                    if (other !== cb) other.checked = false;
                });
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('save-btn');
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));
            
            await fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id_str: '{{ group[2] }}',
                    mode: document.getElementById('mode').value,
                    prize: document.getElementById('prize').value,
                    matches: matches
                })
            });

            btn.innerText = "LAGRET! ✅";
            btn.classList.add('success');
            document.getElementById('go-to-view').style.display = 'block';
            setTimeout(() => {
                btn.innerText = "OPPDATER VALG 💾";
                btn.classList.remove('success');
                window.location.reload(); 
            }, 1500);
        }

        function importLeague(code) {
            if(confirm("Hente ferske kamper? Dette sletter det globale kamp-lageret.")) {
                fetch('/api/import_league/' + code).then(() => window.location.reload());
            }
        }

        async function addSmartQ() {
            const text = document.getElementById('player-select').value;
            const matchId = document.querySelector('.match-check:checked')?.value;
            if(!matchId) return alert("Velg kamp først!");
            await fetch('/api/add_smart_question', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id_str: '{{ group[2] }}', match_id: matchId, text: text })
            });
            window.location.reload();
        }

        async function deleteQuestion(qId) {
            await fetch('/api/delete_question', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ q_id: qId })
            });
            window.location.reload();
        }
    </script>
</body>
</html>
