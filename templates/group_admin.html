<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .admin-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        .share-box { background: #fff5f5; border: 2px dashed var(--md-red); padding: 15px; border-radius: 16px; margin-bottom: 25px; text-align: center; }
        .match-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .smart-btn { background: #f1f1f1; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 700; margin: 5px; font-size: 0.8rem; }
        .btn-save { background: var(--md-red); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 20px; }
        .btn-refresh { background: #28a745; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; margin-bottom: 20px; }
        .match-list { max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 16px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="fw-800 mb-4 text-center">Oppsett: {{ group[1] }}</h2>
        
        <button class="btn-refresh shadow-sm" onclick="refreshMatches()">🔄 HENT FERSKE KAMPER FRA PL</button>

        <div class="share-box">
            <span class="small fw-bold text-muted text-uppercase">Link til deltakerne:</span>
            <div class="fw-800 text-danger mt-1">matchday-demo.onrender.com/group/{{ group[2] }}</div>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Spillmodus</label>
            <select id="mode" class="form-select fw-bold shadow-sm" style="border-radius: 12px;">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Multi Game (Flere kamper)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>Single Game (Supporter-modus)</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Premie i runden</label>
            <input type="text" id="prize" class="form-control fw-bold" value="{{ group[5] or '' }}" placeholder="F.eks: En signert drakt" style="border-radius: 12px;">
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Velg kamper</label>
            <div class="match-list">
                {% for k in kamper %}
                <div class="match-row">
                    <input type="checkbox" class="match-check me-2" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %}>
                    <span class="small fw-bold">{{ k[2] }} - {{ k[3] }}</span>
                </div>
                {% endfor %}
            </div>
        </div>

        <div id="extras-section" class="p-3" style="background: #fdfdfd; border-radius: 20px; border: 2px dashed #eee;">
            <label class="fw-bold small text-uppercase text-muted mb-2 d-block">Smarte spørsmål</label>
            <div class="d-flex flex-wrap mb-3">
                <button class="smart-btn" onclick="addSmartQ('Blir det straffespark?')">+ Straffe?</button>
                <button class="smart-btn" onclick="addSmartQ('Blir det rødt kort?')">+ Rødt kort?</button>
            </div>
            
            <div class="mt-3">
                <label class="small fw-bold text-muted">Hvem scorer?</label>
                <div class="d-flex gap-2">
                    <select id="player-select" class="form-select form-select-sm">
                        {% if players %}
                            {% for p in players %}<option value="Scorer {{ p.name }} ({{ p.team }})?">{{ p.name }} ({{ p.team }})</option>{% endfor %}
                        {% else %}
                            <option value="">Velg kamp og lagre for å se spillere</option>
                        {% endif %}
                    </select>
                    <button class="btn btn-dark btn-sm fw-bold" onclick="addSmartQ(document.getElementById('player-select').value)">LEGG TIL</button>
                </div>
            </div>

            <div class="mt-3" id="q-list">
                {% for q in questions %}<div class="small fw-bold text-success mt-1">✓ {{ q[1] }}</div>{% endfor %}
            </div>
        </div>

        <button class="btn-save shadow-lg" onclick="saveSettings(true)">LAGRE ALT OG AKTIVER 🚀</button>
        <a href="/group/{{ group[2] }}" class="btn btn-outline-dark w-100 mt-3 fw-bold" style="border-radius: 16px; padding: 12px;">GÅ TIL TIPPESIDEN ⚽</a>
    </div>

    <script>
        function refreshMatches() {
            if(confirm("Vil du oppdatere kamp-lageret fra Premier League?")) {
                fetch('/api/import_league/PL').then(() => window.location.reload());
            }
        }

        async function saveSettings(showAlert) {
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));
            
            const response = await fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id_str: '{{ group[2] }}',
                    mode: document.getElementById('mode').value,
                    prize: document.getElementById('prize').value,
                    matches: matches
                })
            });
            if(showAlert) { alert("Alt lagret!"); window.location.reload(); }
            return response;
        }

        async function addSmartQ(text) {
            if(!text) return;
            await saveSettings(false);
            const matchId = document.querySelector('.match-check:checked')?.value;
            if(!matchId) return alert("Velg en kamp først!");

            await fetch('/api/add_smart_question', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id_str: '{{ group[2] }}', match_id: matchId, text: text })
            });
            window.location.reload();
        }
    </script>
</body>
</html>
