<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f3f4f6; --md-card: #ffffff; --md-text: #111827; --md-border: #e5e7eb; }
        body { background-color: var(--md-bg); color: var(--md-text); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; }
        .admin-header { background: white; padding: 20px; border-bottom: 1px solid var(--md-border); margin-bottom: 20px; text-align: center; }
        .card-custom { background: var(--md-card); border: 1px solid var(--md-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .label-style { font-size: 0.7rem; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; display: block; }
        .mode-card { border: 2px solid #e5e7eb; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .mode-card.active { border-color: var(--md-red); background: #fff1f2; color: var(--md-red); }
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1 class="h5 fw-bold m-0">Kontrollpanel</h1>
    <p class="text-muted small m-0">{{ group[1] }}</p>
</div>

<div class="container" style="max-width: 500px;">
    <div class="card-custom">
        <label class="label-style">Instillinger for runden</label>
        <input type="text" id="prize" class="form-control mb-3" placeholder="Hva er premien?" value="{{ group[5] or '' }}">
        <div class="row g-2 mb-3">
            <div class="col-6"><div id="m-multi" class="mode-card {% if group[4] == 'multi' %}active{% endif %}" onclick="setMode('multi')">RUNDE</div></div>
            <div class="col-6"><div id="m-single" class="mode-card {% if group[4] == 'single' %}active{% endif %}" onclick="setMode('single')">STORKAMP</div></div>
        </div>
        <button class="btn btn-dark w-100 fw-bold" onclick="saveSettings()">LAGRE INNSTILLINGER</button>
    </div>

    <div class="card-custom">
        <label class="label-style">Velg kamper fra terminlisten</label>
        {% for m in all_fixtures %}
        <div class="match-row">
            <span class="small fw-bold">{{ m[2] }} - {{ m[3] }}</span>
            <button class="btn btn-sm {% if m[0] in selected_ids %}btn-success{% else %}btn-outline-secondary{% endif %}" onclick="toggleMatch('{{ m[0] }}')">
                {% if m[0] in selected_ids %}VALGT{% else %}VELG{% endif %}
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    let currentMode = '{{ group[4] }}';
    function setMode(m) {
        currentMode = m;
        document.getElementById('m-multi').classList.remove('active');
        document.getElementById('m-single').classList.remove('active');
        document.getElementById('m-' + m).classList.add('active');
    }
    function saveSettings() {
        const p = document.getElementById('prize').value;
        fetch('/api/update_group_settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({group_id:'{{group[0]}}', mode:currentMode, prize_info:p})}).then(()=>location.reload());
    }
    function toggleMatch(fid) {
        fetch('/api/toggle_match', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({group_id:'{{group[0]}}', fixture_id:fid})}).then(()=>location.reload());
    }
</script>
</body>
</html>
