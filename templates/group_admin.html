<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Administrer {{ group[1] }} | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: sans-serif; }
        .nav-header { background: #1a1a1a; color: white; padding: 20px; margin-bottom: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .match-card { border-bottom: 1px solid #eee; padding: 15px; transition: 0.2s; }
        .match-card:hover { background: #fffcfc; }
        .logo-sm { width: 30px; height: 30px; object-fit: contain; }
        .btn-select { width: 120px; border-radius: 20px; font-weight: bold; }
        .selected { background-color: #d1e7dd !important; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h2 class="m-0">{{ group[1] }}</h2>
            <small class="text-white-50">Admin-panel for gruppeleder ({{ group[3] }})</small>
        </div>
        <a href="/super_admin_dashboard" class="btn btn-outline-light btn-sm">Tilbake til Super-Admin</a>
    </div>
</div>

<div class="container">
    <div class="card p-4">
        <h4 class="fw-bold mb-4">Plukk kamper til din kuppong</h4>
        <p class="text-muted">Velg de kampene du vil at medlemmene i <strong>{{ group[1] }}</strong> skal kunne se og tippe på.</p>

        <div id="all-matches">
            {% for k in all_fixtures %}
            <div class="match-card d-flex align-items-center {% if k[0] in selected_ids %}selected{% endif %}" id="row-{{ k[0] }}">
                <div class="col-2 text-muted small">{{ k[6][:10] }}</div>
                <div class="col-4 text-end fw-bold">
                    {{ k[2] }} <img src="{{ k[4] }}" class="logo-sm ms-2">
                </div>
                <div class="col-1 text-center text-danger fw-bold">VS</div>
                <div class="col-4 text-start fw-bold">
                    <img src="{{ k[5] }}" class="logo-sm me-2"> {{ k[3] }}
                </div>
                <div class="col-1 text-end">
                    <button 
                        class="btn btn-sm btn-select {% if k[0] in selected_ids %}btn-success{% else %}btn-outline-dark{% endif %}" 
                        onclick="toggleMatch({{ group[0] }}, {{ k[0] }}, this)">
                        {% if k[0] in selected_ids %}Valgt{% else %}Legg til{% endif %}
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    function toggleMatch(groupId, fixtureId, btn) {
        fetch('/api/toggle_match', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ group_id: groupId, fixture_id: fixtureId })
        })
        .then(res => res.json())
        .then(data => {
            const row = document.getElementById('row-' + fixtureId);
            if (data.action === "lagt til") {
                btn.innerText = "Valgt";
                btn.classList.remove('btn-outline-dark');
                btn.classList.add('btn-success');
                row.classList.add('selected');
            } else {
                btn.innerText = "Legg til";
                btn.classList.remove('btn-success');
                btn.classList.add('btn-outline-dark');
                row.classList.remove('selected');
            }
        });
    }
</script>

</body>
</html>
