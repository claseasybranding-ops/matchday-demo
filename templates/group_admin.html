<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .admin-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        .match-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-save { background: var(--md-red); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #a30000; transform: translateY(-2px); }
        .btn-refresh { background: #28a745; color: white; border: none; padding: 12px; border-radius: 16px; font-weight: 800; width: 100%; margin-bottom: 20px; cursor: pointer; }
        .match-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 16px; padding: 10px; margin-top: 10px; }
        .q-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; margin-bottom: 8px; }
        .btn-delete-q { background: none; border: none; color: #ff4d4d; font-weight: 800; cursor: pointer; padding: 0 5px; }
        .locked-overlay { background: #f8f9fa; border-radius: 20px; padding: 20px; text-align: center; border: 2px solid #eee; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="fw-800 mb-4 text-center">Oppsett: {{ group[1] }}</h2>
        
        <button class="btn-refresh shadow-sm" onclick="refreshMatches()">🔄 OPPDATER KAMP-LISTE</button>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Spillmodus</label>
            <select id="mode" class="form-select fw-bold shadow-sm" style="border-radius: 12px;" onchange="toggleExtras()">
                <option value="multi" {% if group[4] == 'multi' %}selected{% endif %}>Multi Game (Hele runden)</option>
                <option value="single" {% if group[4] == 'single' %}selected{% endif %}>Single Game (Supporter-modus)</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Premie i runden</label>
            <input type="text" id="prize" class="form-control fw-bold shadow-sm" value="{{ group[5] or '' }}" placeholder="F.eks: En iskald boks Cola" style="border-radius: 12px; padding: 12px;">
        </div>

        <div class="mb-4">
            <label class="fw-bold small text-uppercase text-muted">Velg kamp(er) for denne runden</label>
            <div class="match-list">
                {% for k in kamper %}
                <div class="match-row">
                    <input type="checkbox" class="match-check me-2" value="{{ k[0] }}" {% if k[0] in valgte %}checked{% endif %} onchange="handleMatchSelect(this)">
                    <span class="small fw-bold">{{ k[2] }} - {{ k[3] }}</span>
                </div>
                {% endfor %}
            </div>
            <button class="btn-save shadow-sm" onclick="saveSettings(true)">LAGRE KAMPVALG 💾</button>
        </div>

        <div id="extras-section" style="display: {% if group[4] == 'single' %}block{% else %}none{% endif %}; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
            <h5 class="fw-800 mb-3">Tilleggsspørsmål</h5>
            
            {% if valgte and players %}
                <div class="p-3" style="background: #fff; border: 2px solid var(--md-red); border-radius: 20px;">
                    <label class="small fw-bold text-muted text-uppercase">Legg til målscorer</label>
                    <select id="player-select" class="form-select fw-bold mb-2 mt-1" style="border-radius: 10px;">
                        {% for p in players %}
                            <option value="Scorer {{ p.name }} ({{ p.team }})?">{{ p.name }} ({{ p.team }})</option>
                        {% endfor %}
                    </select>
                    <button class="btn btn-dark w-100 fw-800" onclick="addSmartQ()" style="border-radius: 12px;">LEGG TIL SPILLER</button>
                </div>
            {% elif group[4] == 'single' %}
                <div class="locked-overlay">
                    <span class="fs-2">🔒</span>
                    <p class="small fw-bold text-muted m-0 mt-2">Du må velge og LAGRE én kamp for å se spillere.</p>
                </div>
            {% endif %}

            <div class="mt-3" id="q-list">
                {% for q in questions %}
                    <div class="q-item">
                        <span class="small fw-800 text-success">✓ {{ q[1] }}</span>
                        <button class="btn-delete-q" onclick="deleteQuestion('{{ q[0] }}')">✕</button>
                    </div>
                {% endfor %}
            </div>
        </div>

        <a href="/group/{{ group[2] }}" class="btn btn-outline-dark w-100 mt-4 fw-800" style="border-radius: 16px; padding: 15px; text-decoration: none; text-align: center; display: block;">TIL TIPPESIDEN ⚽</a>
    </div>

    <script>
        function handleMatchSelect(checkbox) {
            const mode = document.getElementById('mode').value;
            if (mode === 'single' && checkbox.checked) {
                document.querySelectorAll('.match-check').forEach(cb => {
                    if (cb !== checkbox) cb.checked = false;
                });
            }
        }

        function toggleExtras() {
            const mode = document.getElementById('mode').value;
            const section = document.getElementById('extras-section');
            if (section) section.style.display = (mode === 'single') ? 'block' : 'none';
        }

        async function saveSettings(reload) {
            const matches = [];
            document.querySelectorAll('.match-check:checked').forEach(cb => matches.push(cb.value));
            const mode = document.getElementById('mode').value;
            const prize = document.getElementById('prize').value;

            await fetch('/api/update_group_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    group_id_str: '{{ group[2] }}', 
                    mode: mode, 
                    prize: prize, 
                    matches: matches 
                })
            });
            if(reload) window.location.reload();
        }

        async function addSmartQ() {
            const select = document.getElementById('player-select');
            const matchId = document.querySelector('.match-check:checked')?.value;
            await fetch('/api/add_smart_question', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id_str: '{{ group[2] }}', match_id: matchId, text: select.value })
            });
            window.location.reload();
        }

        async function deleteQuestion(qId) {
            if(confirm("Vil du fjerne dette spørsmålet?")) {
                await fetch(`/api/delete_question/${qId}`, { method: 'POST' });
                window.location.reload();
            }
        }

        function refreshMatches() {
            if(confirm("Dette sletter alt for å starte en ny runde. Er du sikker?")) {
                fetch('/api/import_league/PL').then(() => window.location.reload());
            }
        }
    </script>
</body>
</html>
