<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #1a1a1a; color: white; }</style>
</head>
<body>
    <div class="container mt-5" style="max-width: 500px;">
        <h3 class="text-warning text-center mb-4">ADMIN PANEL</h3>
        <div class="card bg-dark text-white p-4 border-warning">
            <form method="POST">
                <div class="row mb-3 text-center">
                    <div class="col"><input type="text" name="h_navn" class="form-control mb-1" value="{{ s.h_navn }}"><small>Hjemme</small></div>
                    <div class="col"><input type="text" name="b_navn" class="form-control mb-1" value="{{ s.b_navn }}"><small>Borte</small></div>
                </div>
                <div class="row mb-3 text-center">
                    <div class="col"><input type="number" name="h_score" class="form-control fs-3 text-center" value="{{ s.h_score }}"></div>
                    <div class="col"><input type="number" name="b_score" class="form-control fs-3 text-center" value="{{ s.b_score }}"></div>
                </div>
                <div class="mb-3"><label>Spilt minutt</label><input type="text" name="minutt" class="form-control" value="{{ s.minutt }}"></div>
                <div class="mb-4"><label>Hendelse</label><input type="text" name="hendelse" class="form-control" value="{{ s.hendelse }}"></div>
                <button type="submit" class="btn btn-warning w-100 fw-bold py-3">OPPDATER LIVE-STATUS 🚀</button>
            </form>
        </div>
        <div class="mt-3 text-center"><a href="/" class="text-white-50">Gå til forsiden</a></div>
    </div>
</body>
</html>
