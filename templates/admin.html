<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Admin | Overordnet Oppsett</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-light: #f8f9fa;
        }
        body {
            background-color: var(--bg-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            border-radius: 20px;
            border: none;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
        }
        .btn-primary {
            border-radius: 12px;
            padding: 15px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Konkurranse-oppsett</h2>
            <p class="text-muted">Global konfigurasjon for MatchDay-instansen</p>
        </div>

        <div class="card shadow-sm p-4">
            {% if msg %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Navn på hoved-instans</label>
                    <input type="text" name="gruppe" class="form-control" value="{{ o.gruppe if o else '' }}" placeholder="f.eks. MatchDay 2026">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Standard Modus</label>
                    <select name="modus" class="form-select">
                        <option value="multi" {% if o and o.modus == 'multi' %}selected{% endif %}>Multi-game (Flere kamper per runde)</option>
                        <option value="singel" {% if o and o.modus == 'singel' %}selected{% endif %}>Singel-kamp (Fokus på én kamp)</option>
                    </select>
                    <div class="form-text">Dette setter standardvalget for nye grupper.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Kamp-data / Konfigurasjon (JSON)</label>
                    <textarea name="kamp_data" class="form-control" rows="8" style="font-family: monospace; font-size: 0.85rem;">{{ o.kamper | tojson if o and o.kamper else '{}' }}</textarea>
                    <div class="form-text">Her lagres tekniske parametere for runden. Endres kun ved behov.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-sm">
                    OPPDATER OPPSETT 🚀
                </button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none text-muted">← Gå tilbake til forsiden</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
