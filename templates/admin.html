<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Oppsett</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; padding: 20px; }</style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h2 class="fw-bold mb-4">Konkurranse-oppsett</h2>
        
        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="fw-bold">Gruppenavn</label>
                <input type="text" name="gruppe" class="form-control" value="{{ o.gruppe }}">
            </div>

            <div class="mb-3">
                <label class="fw-bold">Konkurranse-type</label>
                <select name="modus" class="form-select">
                    <option value="singel" {% if o.modus == 'singel' %}selected{% endif %}>Singel-kamp (med tillegg)</option>
                    <option value="multi" {% if o.modus == 'multi' %}selected{% endif %}>Multi-game (Tabell)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Kamper i konkurransen (JSON-format)</label>
                <textarea name="kamp_data" class="form-control" rows="5">{{ o.kamper | tojson }}</textarea>
                <small class="text-muted">Her kan vi senere legge inn en søkefunksjon for å slippe JSON.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">OPPDATER KONKURRANSE 🚀</button>
        </form>
    </div>
</body>
</html>
