<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <div class="card shadow-sm p-4 border-0" style="border-radius: 20px;">
            <h2 class="fw-bold mb-4">Konkurranse-oppsett</h2>
            
            {% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Gruppenavn</label>
                    <input type="text" name="gruppe" class="form-control" value="{{ o.gruppe }}">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Modus</label>
                    <select name="modus" class="form-select">
                        <option value="singel" {% if o.modus == 'singel' %}selected{% endif %}>Singel-kamp (med tillegg)</option>
                        <option value="multi" {% if o.modus == 'multi' %}selected{% endif %}>Multi-game (Kun resultater)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Kamp-data (JSON)</label>
                    <textarea name="kamp_data" class="form-control" rows="5">{{ o.kamper | tojson }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px;">OPPDATER OPPSETT 🚀</button>
            </form>
        </div>
    </div>
</body>
</html>
