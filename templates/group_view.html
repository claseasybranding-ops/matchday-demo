<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MatchDay | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-red: #cc0000;
            --md-bg: #f5f7fa;
            --md-card: #ffffff;
            --md-text: #1a1a1a;
            --md-border: #e1e8ed;
        }

        body { 
            background-color: var(--md-bg); 
            color: var(--md-text); 
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            padding-bottom: 50px;
        }

        .header-section {
            padding: 25px 0;
            text-align: center;
            background: white;
            border-bottom: 1px solid var(--md-border);
            margin-bottom: 25px;
        }

        .logo-text { 
            color: var(--md-red); 
            font-weight: 800; 
            font-size: 1.6rem; 
            margin-bottom: 0; 
            letter-spacing: -1px;
        }

        /* Kamp-kort - Minimalistisk */
        .match-card {
            background: var(--md-card);
            border: 1px solid var(--md-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        /* GRID-LAYOUT FOR PERFEKT SYMETRI */
        .match-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Venstre - Senter - Høyre */
            align-items: center;
            gap: 10px;
        }

        /* Lag-blokker */
        .team-block {
            text-align: center;
            width: 100%;
        }
        .team-logo-pro {
            width: 40px; /* Mindre logoer */
            height: 40px;
            object-fit: contain;
            margin-bottom: 6px;
        }
        .team-name-pro {
            font-size: 0.7rem; /* Mindre skrift */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #444;
            display: block;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Forhindrer urolig layout med lange navn */
        }

        /* Resultat-senter */
        .score-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .score-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--md-text);
            width: 35px;
            text-align: center;
        }
        .score-divider {
            font-size: 1.2rem;
            font-weight: 800;
            color: #aaa;
        }

        /* Pluss/Minus knapper */
        .btn-score {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--md-border);
            background: white;
            color: #888;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            line-height: 0;
            padding: 0;
        }
        .btn-score:hover {
            border-color: #aaa;
            color: #333;
            background: #f8f8f8;
        }
        .btn-score:active { transform: scale(0.95); }

        /* Inputs for navn */
        .input-custom-pro {
            background: white;
            border: 1px solid var(--md-border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Leveringsknapp */
        .btn-submit-pro {
            background: var(--md-red);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 10px rgba(204, 0, 0, 0.15);
        }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <h1 class="logo-text">MatchDay.</h1>
        <p class="text-muted small fw-bold text-uppercase m-0">{{ group[1] }}</p>
    </div>
</div>

<div class="container" style="max-width: 450px;">
    
    <div id="coupon">
        {% for m in matches %}
        <div class="match-card" data-match-id="{{ m[0] }}">
            <div class="match-grid">
                <div class="team-block">
                    <img src="{{ m[4] }}" class="team-logo-pro" onerror="this.src='https://via.placeholder.com/40'">
                    <span class="team-name-pro">{{ m[2] }}</span>
                    <div class="d-flex justify-content-center gap-1 mt-1">
                        <button class="btn-score minus" onclick="adjustScore(this, -1)">-</button>
                        <button class="btn-score plus" onclick="adjustScore(this, 1)">+</button>
                    </div>
                </div>
                
                <div class="score-center">
                    <span class="score-display home-display">0</span>
                    <span class="score-divider">-</span>
                    <span class="score-display away-display">0</span>
                </div>

                <div class="team-block">
                    <img src="{{ m[5] }}" class="team-logo-pro" onerror="this.src='https://via.placeholder.com/40'">
                    <span class="team-name-pro">{{ m[3] }}</span>
                    <div class="d-flex justify-content-center gap-1 mt-1">
                        <button class="btn-score minus" onclick="adjustScore(this, -1)">-</button>
                        <button class="btn-score plus" onclick="adjustScore(this, 1)">+</button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="mt-4">
            <input type="text" id="p-name" class="form-control input-custom-pro w-100" placeholder="Skriv navnet ditt...">
            <button class="btn-submit-pro" onclick="submitTicket()">LEVER KUPONG</button>
        </div>
    </div>
</div>

<script>
    function adjustScore(btn, amount) {
        const teamBlock = btn.closest('.team-block');
        const card = btn.closest('.match-card');
        
        // Finn ut om det er hjemme eller borte basert på grid-posisjon
        const isHome = teamBlock === card.querySelector('.team-block:first-child');
        const display = card.querySelector(isHome ? '.home-display' : '.away-display');
        
        let currentScore = parseInt(display.innerText);
        currentScore = Math.max(0, currentScore + amount); // Kan ikke være mindre enn 0
        display.innerText = currentScore;
    }

    function submitTicket() {
        const name = document.getElementById('p-name').value;
        if(!name) { alert("Vennligst skriv navnet ditt"); return; }
        
        const matches = [];
        document.querySelectorAll('.match-card').forEach(card => {
            matches.push({
                id: card.getAttribute('data-match-id'),
                h: card.querySelector('.home-display').innerText,
                a: card.querySelector('.away-display').innerText
            });
        });

        console.log("Leverer for:", name, matches);
        alert("Kupongen din er registrert!");
    }
</script>

</body>
</html>
