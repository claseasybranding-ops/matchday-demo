<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 40px; }
        .navbar { background-color: var(--md-dark); border-bottom: 3px solid var(--md-red); }
        .prize-banner { background: linear-gradient(45deg, #1a1a1a, #333); color: gold; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid gold; text-align: center; }
        .match-card { background: white; border-radius: 12px; margin-bottom: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .score-input { width: 60px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; border: 2px solid #eee; border-radius: 8px; }
        .btn-main { background: var(--md-red); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; text-transform: uppercase; }
        .name-input { padding: 15px; border-radius: 12px; border: 2px solid #e5e7eb; width: 100%; margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3">
        <div class="container d-flex justify-content-center">
            <a class="navbar-brand fw-bold" href="/">MATCHDAY</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 600px;">
        <div class="prize-banner shadow">
            <h5 class="mb-0">🏆 PREMIE I RUNDEN</h5>
            <p class="mb-0 fw-bold" style="font-size: 1.4rem;">{{ group[5] or 'Ære og berømmelse' }}</p>
        </div>

        <h4 class="mb-3 fw-bold">Sett dine tips:</h4>
        
        {% for k in kamper %}
        <div class="match-card" data-id="{{ k[0] }}">
            <div class="d-flex justify-content-between align-items-center">
                <div class="text-center" style="width: 35%;">
                    <img src="{{ k[4] }}" class="mb-2" style="width: 45px; height: 45px; object-fit: contain;">
                    <div class="fw-bold small">{{ k[2] }}</div>
                </div>
                <div class="d-flex align-items-center">
                    <input type="number" class="score-input h-score" value="0">
                    <span class="mx-2 fw-bold">-</span>
                    <input type="number" class="score-input b-score" value="0">
                </div>
                <div class="text-center" style="width: 35%;">
                    <img src="{{ k[5] }}" class="mb-2" style="width: 45px; height: 45px; object-fit: contain;">
                    <div class="fw-bold small">{{ k[3] }}</div>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="mt-4 p-3 bg-white rounded shadow-sm border">
            <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Ditt Navn</label>
            <input type="text" id="user-name-field" class="name-input" placeholder="Skriv navnet ditt her...">
            <button class="btn-main shadow" onclick="saveTips()">SEND INN TIPS & SE TABELL</button>
        </div>
    </div>

    <script>
        function saveTips() {
            const userName = document.getElementById('user-name-field').value;
            if (!userName || userName.trim() === "") {
                alert("Du må skrive navnet ditt for å delta!");
                return;
            }

            const tipsData = [];
            document.querySelectorAll('.match-card').forEach(card => {
                tipsData.push({
                    match_id: card.getAttribute('data-id'),
                    h: card.querySelector('.h-score').value || 0,
                    a: card.querySelector('.b-score').value || 0
                });
            });

            fetch('/api/submit_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id: '{{ group[2] }}',
                    user_name: userName,
                    tips: tipsData
                })
            }).then(() => {
                // Sender brukeren direkte til leaderboard-siden
                window.location.href = "/group/{{ group[2] }}/leaderboard";
            });
        }
    </script>
</body>
</html>
