<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; }
        .card { background: #2d2d2d; border: none; border-radius: 20px; color: white; }
        .btn-check-custom { background: #3d3d3d; color: white; border: 1px solid #555; width: 100%; margin-bottom: 5px; }
    </style>
</head>
<body class="p-3">
    <div class="container" style="max-width: 500px;">
        <h3 class="text-center fw-bold text-danger">MatchDay.</h3>
        <p class="text-center opacity-50">{{ group[1] }}</p>

        {% for m in matches %}
        <div class="card p-4 mb-3 text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="text-center" style="width: 40%"><img src="{{ m[4] }}" width="50"><br><small>{{ m[2] }}</small></div>
                <div class="fw-bold h4">VS</div>
                <div class="text-center" style="width: 40%"><img src="{{ m[5] }}" width="50"><br><small>{{ m[3] }}</small></div>
            </div>

            {% if group[4] == 'single' %}
            <div class="text-start mt-3 border-top pt-3">
                <label class="small fw-bold text-danger">SLUTTRESULTAT:</label>
                <div class="d-flex gap-2 mb-3">
                    <input type="number" class="form-control bg-dark text-white border-secondary" placeholder="H">
                    <input type="number" class="form-control bg-dark text-white border-secondary" placeholder="B">
                </div>

                <label class="small fw-bold text-danger">HENDELSER I KAMPEN:</label>
                <div class="row g-2 mb-3">
                    <div class="col-6"><button class="btn btn-check-custom">Straffespark?</button></div>
                    <div class="col-6"><button class="btn btn-check-custom">Rødt kort?</button></div>
                </div>

                <label class="small fw-bold text-danger">GOLDEN GOAL (Minutt første mål):</label>
                <input type="number" class="form-control bg-dark text-white border-secondary" placeholder="F.eks. 24">
            </div>
            {% else %}
            <div class="d-flex gap-2">
                <input type="number" class="form-control bg-dark text-white border-secondary text-center" placeholder="H">
                <input type="number" class="form-control bg-dark text-white border-secondary text-center" placeholder="B">
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <input type="text" class="form-control mb-3" placeholder="Ditt navn">
        <button class="btn btn-danger w-100 fw-bold py-3 rounded-pill shadow">LEVER KUPONG</button>
    </div>
</body>
</html>
