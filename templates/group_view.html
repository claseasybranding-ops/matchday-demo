<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | Tipp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; --md-gold: #FFD700; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        
        .header { background: white; padding: 15px; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        
        .prize-card { background: white; border-radius: 20px; padding: 12px 18px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border-left: 5px solid var(--md-gold); }
        .prize-icon { font-size: 1.5rem; margin-right: 12px; }
        
        /* Regler-boks */
        .rules-badge { border-left: 5px solid var(--md-red); background: #fffcfc; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); }

        /* Kamp-kortet - gjort mer kompakt */
        .match-card { background: white; border-radius: 24px; padding: 15px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Justert logo og navn for mobil */
        .team-box { width: 30%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .team-logo { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .team-name { font-weight: 800; font-size: 0.75rem; line-height: 1.1; text-align: center; display: block; }

        .score-display { width: 40%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .score-box { background: #f1f1f1; border-radius: 12px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; }
        
        /* Store knapper for enkel bruk */
        .btn-adjust { width: 42px; height: 42px; border-radius: 12px; border: 2px solid #eee; background: white; font-weight: 800; font-size: 1.2rem; transition: 0.2s; }
        .btn-adjust:active { background: #f8f8f8; transform: scale(0.95); }
        
        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 15px 30px 15px; border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
        .btn-submit { background: var(--md-red); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 800; width: 100%; font-size: 1rem; text-transform: uppercase; box-shadow: 0 8px 20px rgba(204, 0, 0, 0.2); }
        
        .gg-input { border: 2px solid var(--md-red); border-radius: 15px; padding: 12px; text-align: center; font-size: 1.1rem; font-weight: 800; width: 100%; color: var(--md-red); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 class="fw-800 m-0" style="font-size: 1.4rem;">{{ group[1] }}</h2>
    </div>

    <div class="container" style="max-width: 480px;">
        <div class="prize-card shadow-sm">
            <div class="prize-icon">🎁</div>
            <div>
                <div class="small fw-800 text-muted text-uppercase" style="font-size: 0.6rem;">Rundens Premie</div>
                <div class="fw-800 m-0" style="font-size: 1rem;">{{ group[5] or 'Middag' }}</div>
            </div>
        </div>

        <div class="rules-badge text-center">
            <h6 class="fw-800 text-uppercase small mb-2">Poeng: 3p (Resultat) | 1p (HUB) | +5p/2p (GG)</h6>
        </div>

        {% for k in kamper %}
        <div class="text-muted small fw-800 mb-1 ps-2" style="font-size: 0.65rem; color: #4a90e2;">⚽ START: {{ k[6] }}</div>
        <div class="match-card match-row" data-id="{{ k[0] }}">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div class="team-box">
                    <img src="{{ k[4] }}" class="team-logo">
                    <span class="team-name">{{ k[2] }}</span>
                </div>
                
                <div class="score-display">
                    <div class="score-box h-score">0</div>
                    <div class="fw-800 text-muted">:</div>
                    <div class="score-box a-score">0</div>
                </div>

                <div class="team-box">
                    <img src="{{ k[5] }}" class="team-logo">
                    <span class="team-name">{{ k[3] }}</span>
                </div>
            </div>
            
            <div class="d-flex justify-content-center gap-4">
                <div class="d-flex gap-2">
                    <button class="btn-adjust" onclick="adj(this, 'h', -1)">-</button>
                    <button class="btn-adjust" onclick="adj(this, 'h', 1)">+</button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-adjust" onclick="adj(this, 'a', -1)">-</button>
                    <button class="btn-adjust" onclick="adj(this, 'a', 1)">+</button>
                </div>
            </div>
        </div>
        {% endfor %}

        {% if group[4] == 'single' %}
        <div class="match-card">
            <label class="fw-800 small text-uppercase text-muted d-block text-center">Golden Goal (Minutt)</label>
            <input type="number" id="golden-goal" class="gg-input" placeholder="Eks: 24">
        </div>
        {% else %}
        <input type="hidden" id="golden-goal" value="0">
        {% endif %}
    </div>

    <div class="footer-action">
        <div class="container" style="max-width: 440px;">
            <div class="row g-2">
                <div class="col-5">
                    <input type="text" id="user-name" class="form-control p-3 fw-bold" placeholder="Navn..." style="border-radius:14px; font-size: 0.9rem;">
                </div>
                <div class="col-7">
                    <button class="btn-submit" onclick="sendTips()">Lagre tips 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adj(btn, side, d) {
            const row = btn.closest('.match-row');
            const el = row.querySelector('.' + side + '-score');
            let val = parseInt(el.innerText) + d;
            if (val >= 0) el.innerText = val;
        }

        function sendTips() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Husk navn!");
            const tips = [];
            document.querySelectorAll('.match-row').forEach(row => {
                tips.push({ match_id: row.dataset.id, h: row.querySelector('.h-score').innerText, a: row.querySelector('.a-score').innerText });
            });
            fetch('/api/submit_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id: '{{ group[2] }}', user_name: name, tips: tips, golden_goal: document.getElementById('golden-goal').value })
            }).then(res => { window.location.href = "/group/{{ group[2] }}/leaderboard"; });
        }
    </script>
</body>
</html>
