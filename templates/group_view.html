<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MatchDay | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-red: #cc0000;
            --md-bg: #f2f4f7;
            --md-card: #ffffff;
            --md-text: #1a1a1a;
            --md-border: #e2e8f0;
        }

        body { background-color: var(--md-bg); color: var(--md-text); font-family: 'Inter', sans-serif; padding-bottom: 40px; }

        .app-header { background: white; padding: 15px 0; text-align: center; border-bottom: 1px solid var(--md-border); position: sticky; top: 0; z-index: 1000; }
        .logo-text { color: var(--md-red); font-weight: 800; font-size: 1.4rem; margin: 0; letter-spacing: -1px; }

        .prize-section { background: white; padding: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--md-border); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .prize-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--md-red); background: rgba(204, 0, 0, 0.1); padding: 2px 8px; border-radius: 4px; }
        .prize-text { font-size: 0.9rem; font-weight: 600; color: #444; }

        .match-card { background: var(--md-card); border: 1px solid var(--md-border); border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; text-align: center; }

        .team-logo { width: 32px; height: 32px; object-fit: contain; margin-bottom: 5px; }
        .team-name { font-size: 0.75rem; font-weight: 700; display: block; }

        .score-row { display: flex; align-items: center; gap: 8px; }
        .score-val { font-size: 1.6rem; font-weight: 800; width: 25px; }
        .btn-adj { width: 32px; height: 32px; border: 1px solid var(--md-border); background: #f8fafc; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-adj:active { background: #eee; transform: scale(0.9); }

        /* Tilleggsspørsmål for Storkamp */
        .bonus-box { background: #f8fafc; border-radius: 10px; padding: 15px; margin-top: 15px; border: 1px solid var(--md-border); }
        .form-switch .form-check-input:checked { background-color: var(--md-red); border-color: var(--md-red); }

        .input-name { border: 1px solid var(--md-border); border-radius: 10px; padding: 15px; font-weight: 600; text-align: center; margin-top: 20px; width: 100%; }
        .btn-submit { background: var(--md-red); color: white; border: none; border-radius: 10px; padding: 16px; width: 100%; font-weight: 800; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app-header">
    <h1 class="logo-text">MatchDay.</h1>
    <div class="text-muted" style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase;">{{ group[1] }}</div>
</div>

{% if group[5] %}
<div class="prize-section">
    <span class="prize-label">Premie</span>
    <span class="prize-text">🏆 {{ group[5] }}</span>
</div>
{% endif %}

<div class="container" style="max-width: 450px; margin-top: 10px;">
    {% for m in matches %}
    <div class="match-card" data-match-id="{{ m[0] }}">
        <div class="match-grid">
            <div class="team-side">
                <img src="{{ m[4] }}" class="team-logo" onerror="this.src='https://via.placeholder.com/32'">
                <span class="team-name">{{ m[2] }}</span>
                <div class="d-flex justify-content-center gap-1 mt-2">
                    <button class="btn-adj" onclick="adj(this, -1)">-</button>
                    <button class="btn-adj" onclick="adj(this, 1)">+</button>
                </div>
            </div>

            <div class="score-row px-3">
                <span class="score-val h-val">0</span>
                <span class="text-muted fw-bold">-</span>
                <span class="score-val a-val">0</span>
            </div>

            <div class="team-side">
                <img src="{{ m[5] }}" class="team-logo" onerror="this.src='https://via.placeholder.com/32'">
                <span class="team-name">{{ m[3] }}</span>
                <div class="d-flex justify-content-center gap-1 mt-2">
                    <button class="btn-adj" onclick="adj(this, -1)">-</button>
                    <button class="btn-adj" onclick="adj(this, 1)">+</button>
                </div>
            </div>
        </div>

        {% if group[4] == 'single' %}
        <div class="bonus-box">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-bold">Straffespark i kampen?</span>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="small fw-bold">Rødt kort i kampen?</span>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox"></div>
            </div>
            <label class="small fw-bold text-muted mb-1">Golden Goal (Minutt):</label>
            <input type="number" class="form-control form-control-sm text-center fw-bold" placeholder="F.eks. 34">
        </div>
        {% endif %}
    </div>
    {% endfor %}

    <input type="text" id="name" class="input-name" placeholder="Ditt navn">
    <button class="btn-submit" onclick="send()">Lever kupong</button>
</div>

<script>
    function adj(btn, val) {
        const card = btn.closest('.match-card');
        const side = btn.closest('.team-side');
        const isHome = side === card.querySelector('.team-side:first-child');
        const target = card.querySelector(isHome ? '.h-val' : '.a-val');
        let current = parseInt(target.innerText);
        target.innerText = Math.max(0, current + val);
    }

    function send() {
        const name = document.getElementById('name').value;
        if(!name) { alert("Vennligst skriv navnet ditt"); return; }
        alert("Kupongen er registrert!");
    }
</script>
</body>
</html>
