<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MatchDay | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #0f0f0f; --md-card: #1a1a1a; --md-border: #333; }
        body { background-color: var(--md-dark); color: #e0e0e0; font-family: 'Inter', -apple-system, sans-serif; padding-bottom: 50px; }
        
        .header-section { padding: 30px 20px; text-align: center; }
        .logo-text { color: var(--md-red); font-weight: 900; font-size: 2.2rem; margin-bottom: 0; letter-spacing: -1px; }
        
        .prize-card { 
            background: linear-gradient(135deg, var(--md-red) 0%, #800000 100%);
            border-radius: 16px; padding: 15px; margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4); border: none;
        }

        .match-card { 
            background: var(--md-card); border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; border: 1px solid var(--md-border); position: relative;
        }
        .single-game-active { border: 1px solid var(--md-red); box-shadow: 0 0 20px rgba(204, 0, 0, 0.15); }
        
        .badge-main { 
            background: var(--md-red); position: absolute; top: -12px; left: 50%; 
            transform: translateX(-50%); padding: 4px 12px; border-radius: 8px; 
            font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px;
        }

        .score-box { 
            background: #111; border: 1px solid #444; color: white; 
            font-size: 1.8rem; font-weight: 800; text-align: center; 
            width: 65px; height: 65px; border-radius: 12px; transition: 0.2s;
        }
        .score-box:focus { border-color: var(--md-red); outline: none; background: #000; }
        
        .team-logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .team-name { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; opacity: 0.9; }

        .bonus-box { 
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; 
            margin-top: 20px; border-top: 1px solid var(--md-border);
        }
        
        .btn-submit { 
            background: var(--md-red); color: white; border: none; 
            border-radius: 12px; padding: 18px; font-weight: 800; 
            font-size: 1.1rem; width: 100%; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.3);
        }
        .btn-submit:active { transform: scale(0.98); }

        .form-control-custom {
            background: #1a1a1a; border: 1px solid #444; color: white;
            border-radius: 12px; padding: 15px; text-align: center;
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 480px;">
    <div class="header-section">
        <h1 class="logo-text">MatchDay.</h1>
        <p class="small text-muted text-uppercase fw-bold">{{ group[1] }}</p>
    </div>

    {% if group[5] %}
    <div class="prize-card text-center">
        <div class="small fw-bold text-uppercase opacity-75 mb-1" style="font-size: 0.6rem;">Dagens Premie</div>
        <div class="h5 fw-bold m-0 text-white">🏆 {{ group[5] }}</div>
    </div>
    {% endif %}

    <div id="coupon-form">
        {% for m in matches %}
        <div class="match-card {% if group[4] == 'single' %}single-game-active{% endif %}" data-match-id="{{ m[0] }}">
            {% if group[4] == 'single' %}<div class="badge-main">HOVEDKAMP</div>{% endif %}
            
            <div class="row align-items-center text-center">
                <div class="col-4">
                    <img src="{{ m[4] }}" class="team-logo" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="team-name">{{ m[2] }}</div>
                </div>
                
                <div class="col-4 px-0">
                    <div class="d-flex justify-content-center align-items-center">
                        <input type="number" pattern="\d*;" class="score-box home-score" placeholder="0" inputmode="numeric">
                        <div class="mx-1 fw-bold opacity-25">-</div>
                        <input type="number" pattern="\d*;" class="score-box away-score" placeholder="0" inputmode="numeric">
                    </div>
                </div>

                <div class="col-4">
                    <img src="{{ m[5] }}" class="team-logo" onerror="this.src='https://via.placeholder.com/50'">
                    <div class="team-name">{{ m[3] }}</div>
                </div>
            </div>

            {% if group[4] == 'single' %}
            <div class="bonus-box">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="small fw-bold text-muted">Blir det straffespark?</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input pen-check" type="checkbox">
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="small fw-bold text-muted">Blir det rødt kort?</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input red-check" type="checkbox">
                    </div>
                </div>
                <div class="mt-2">
                    <label class="small fw-bold text-muted mb-1">Golden Goal (minutt):</label>
                    <input type="number" class="form-control-custom w-100 gg-input" placeholder="Minutt f.eks. 34" inputmode="numeric">
                </div>
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <div class="mt-4">
            <input type="text" id="player-name" class="form-control-custom w-100 mb-3" placeholder="Skriv ditt navn...">
            <button class="btn btn-submit" onclick="submitCoupon()">LEVER KUPONG</button>
        </div>
    </div>
</div>

<script>
function submitCoupon() {
    const name = document.getElementById('player-name').value;
    if (!name) {
        alert("Du må skrive inn navnet ditt!");
        return;
    }

    const matches = [];
    document.querySelectorAll('.match-card').forEach(card => {
        const matchId = card.getAttribute('data-match-id');
        const hScore = card.querySelector('.home-score').value || 0;
        const bScore = card.querySelector('.away-score').value || 0;
        
        let bonus = null;
        if (card.querySelector('.gg-input')) {
            bonus = {
                penalty: card.querySelector('.pen-check').checked,
                redCard: card.querySelector('.red-check').checked,
                goldenGoal: card.querySelector('.gg-input').value || 0
            };
        }

        matches.push({
            id: matchId,
            h: hScore,
            b: bScore,
            bonus: bonus
        });
    });

    console.log("Leverer kupong for:", name, matches);
    alert("Kupong levert! (Her kobler vi på API-et i neste steg)");
}
</script>

</body>
</html>
