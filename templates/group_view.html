<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; padding-bottom: 50px; }
        .prize-banner { background: #cc0000; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 10px rgba(204, 0, 0, 0.3); }
        .match-card { background: #1e1e1e; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .score-input { background: #2a2a2a; border: 1px solid #444; color: white; text-align: center; font-size: 1.5rem; font-weight: bold; border-radius: 10px; }
        .single-bonus { background: #252525; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid #cc0000; }
        .btn-action { background: #333; color: white; border: 1px solid #444; width: 100%; margin-top: 5px; }
    </style>
</head>
<body class="container py-4">
    <h2 class="text-center fw-bold text-danger mb-1">MatchDay.</h2>
    <p class="text-center small text-muted mb-4">{{ group[1] }}</p>

    {% if group[5] %}
    <div class="prize-banner">
        <small class="fw-bold opacity-75">PREMIE I DENNE RUNDEN:</small>
        <div class="h5 m-0 fw-bold">🏆 {{ group[5] }}</div>
    </div>
    {% endif %}

    {% for m in matches %}
    <div class="match-card">
        <div class="row align-items-center text-center">
            <div class="col-4"><img src="{{ m[4] }}" width="45"><br><small class="fw-bold d-block mt-1">{{ m[2] }}</small></div>
            <div class="col-4 text-muted fw-bold">VS</div>
            <div class="col-4"><img src="{{ m[5] }}" width="45"><br><small class="fw-bold d-block mt-1">{{ m[3] }}</small></div>
        </div>

        <div class="row g-2 mt-3">
            <div class="col-6"><input type="number" class="form-control score-input" placeholder="0"></div>
            <div class="col-6"><input type="number" class="form-control score-input" placeholder="0"></div>
        </div>

        {% if group[4] == 'single' %}
        <div class="single-bonus">
            <label class="small fw-bold text-danger mb-2">EKSTRA SPØRSMÅL:</label>
            <button class="btn btn-action" onclick="this.classList.toggle('btn-danger')">Blir det straffespark?</button>
            <button class="btn btn-action" onclick="this.classList.toggle('btn-danger')">Blir det rødt kort?</button>
            <input type="number" class="form-control bg-dark text-white border-secondary mt-2" placeholder="Golden Goal (Minutt)">
        </div>
        {% endif %}
    </div>
    {% endfor %}

    <div class="mt-4">
        <input type="text" class="form-control form-control-lg bg-dark text-white border-secondary text-center mb-3" placeholder="Ditt navn">
        <button class="btn btn-danger btn-lg w-100 fw-bold py-3 shadow">LEVER KUPONG</button>
    </div>
</body>
</html>
