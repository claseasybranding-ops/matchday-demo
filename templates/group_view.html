<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konkurranse | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; }
        body { background-color: #f4f4f4; }
        .navbar { background-color: #1a1a1a; color: white; }
        .match-card { background: white; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-logo { width: 40px; height: 40px; object-fit: contain; }
        .score-input { width: 50px; text-align: center; font-weight: bold; border: 2px solid #ddd; border-radius: 5px; }
        .leaderboard-table { background: white; border-radius: 10px; overflow: hidden; }
        .leaderboard-table thead { background: #1a1a1a; color: white; }
        .rank-1 { background-color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar p-3 mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-white">MATCHDAY</span>
            <span class="badge bg-danger">Gruppe: {{ group_id }}</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <h4 class="mb-4">Dine Tips</h4>
                <div id="matches-container">
                    <div class="match-card p-3 d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center flex-fill">
                            <img src="https://media.api-sports.io/football/teams/33.png" class="team-logo me-2">
                            <span class="fw-bold">Man United</span>
                        </div>
                        <div class="d-flex align-items-center mx-3">
                            <input type="number" class="score-input mx-1" value="0">
                            <span class="fw-bold">-</span>
                            <input type="number" class="score-input mx-1" value="0">
                        </div>
                        <div class="d-flex align-items-center flex-fill justify-content-end">
                            <span class="fw-bold">Liverpool</span>
                            <img src="https://media.api-sports.io/football/teams/40.png" class="team-logo ms-2">
                        </div>
                    </div>
                </div>
                <button class="btn btn-danger w-100 py-3 mb-5 fw-bold" onclick="saveBets()">LAGRE TIPS</button>
            </div>

            <div class="col-lg-4">
                <h4 class="mb-4">Leaderboard (Modul 5)</h4>
                <div class="leaderboard-table shadow-sm">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Bruker</th>
                                <th>Poeng</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <tr class="rank-1"><td>1</td><td>Ola Nordmann</td><td>12</td></tr>
                            <tr><td>2</td><td>Kari B.</td><td>9</td></tr>
                            <tr><td>3</td><td>Petter</td><td>7</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-3 small text-muted">
                    * 3p for riktig resultat, 1p for riktig vinner.
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="betsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tips-oversikt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-content">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function saveBets() {
            alert("Tipsene dine er lagret! (Modul 4)");
        }

        // Funksjon for å oppdatere live-scores automatisk (Modul 5)
        setInterval(function() {
            fetch('/api/update_live_scores')
                .then(r => r.json())
                .then(d => console.log("Poeng synkronisert"));
        }, 60000); // Hvert minutt
    </script>
</body>
</html>
