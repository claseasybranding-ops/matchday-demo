<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        
        .navbar { background-color: white; border-bottom: 2px solid var(--md-red); padding: 15px 0; }
        .navbar-brand { color: var(--md-dark) !important; letter-spacing: -1px; font-weight: 800; }

        .prize-banner { 
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); 
            color: #FFD700; border-radius: 16px; padding: 25px; margin-bottom: 30px; 
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .match-card { 
            background: white; border-radius: 16px; margin-bottom: 15px; padding: 25px; 
            border: 1px solid rgba(0,0,0,0.05); shadow: 0 4px 12px rgba(0,0,0,0.03);
        }
        
        /* Styling for låst kamp */
        .match-locked { opacity: 0.6; background: #eee; pointer-events: none; }
        .lock-badge { font-size: 0.7rem; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .team-name { font-size: 0.85rem; font-weight: 700; margin-top: 8px; color: #444; }
        .score-input { 
            width: 55px; height: 55px; text-align: center; font-size: 1.6rem; 
            font-weight: 800; border: 2px solid #eee; border-radius: 12px;
        }

        .action-container {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            padding: 20px; border-top: 1px solid #eee; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 1000;
        }

        .name-input { padding: 12px 15px; border-radius: 10px; border: 2px solid #eee; width: 100%; margin-bottom: 12px; font-weight: 600; }
        .btn-main { 
            background: var(--md-red); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: 800; width: 100%; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav class="navbar mb-4 shadow-sm text-center">
        <div class="container d-flex justify-content-center">
            <a class="navbar-brand" href="/">MATCHDAY<span style="color:var(--md-red)">.</span></a>
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        <div class="prize-banner">
            <div class="small fw-bold text-uppercase opacity-75 mb-1">🏆 Dagens Premie</div>
            <div class="fw-800" style="font-size: 1.5rem;">{{ group[5] or 'Ære og berømmelse' }}</div>
        </div>

        <h5 class="mb-3 fw-800 text-muted text-uppercase small">Dine Tips</h5>
        
        {% for k in kamper %}
        <div class="match-card {% if k[10] %}match-locked{% endif %}" data-id="{{ k[0] }}">
            {% if k[10] %}
            <span class="lock-badge">🔒 Låst (Kampstart er nær)</span>
            {% endif %}
            
            <div class="d-flex justify-content-between align-items-center">
                <div class="text-center" style="width: 33%;">
                    <img src="{{ k[4] }}" style="width: 48px; height: 48px; object-fit: contain;">
                    <div class="team-name">{{ k[2] }}</div>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <input type="number" class="score-input h-score" value="0" {% if k[10] %}disabled{% endif %}>
                    <span class="fw-800 text-muted">:</span>
                    <input type="number" class="score-input b-score" value="0" {% if k[10] %}disabled{% endif %}>
                </div>

                <div class="text-center" style="width: 33%;">
                    <img src="{{ k[5] }}" style="width: 48px; height: 48px; object-fit: contain;">
                    <div class="team-name">{{ k[3] }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="action-container">
        <div class="container" style="max-width: 460px;">
            <input type="text" id="user-name-field" class="name-input" placeholder="Skriv navnet ditt her...">
            <button class="btn-main" onclick="saveTips()">Lagre alle tips 🚀</button>
        </div>
    </div>

    <script>
        function saveTips() {
            const userName = document.getElementById('user-name-field').value;
            if (!userName) return alert("Du må skrive navnet ditt!");

            const tipsData = [];
            document.querySelectorAll('.match-card:not(.match-locked)').forEach(card => {
                tipsData.push({
                    match_id: card.getAttribute('data-id'),
                    h: card.querySelector('.h-score').value || 0,
                    a: card.querySelector('.b-score').value || 0
                });
            });

            fetch('/api/submit_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    group_id: '{{ group[2] }}',
                    user_name: userName,
                    tips: tipsData
                })
            }).then(res => {
                if(res.ok) window.location.href = "/group/{{ group[2] }}/leaderboard";
                else alert("Kunne ikke lagre. Kanskje deadlinen gikk ut?");
            });
        }
    </script>
</body>
</html>
