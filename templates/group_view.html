<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | Tipp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; --md-gold: #FFD700; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 220px; }
        
        .header { background: white; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        
        .prize-card { background: white; border-radius: 24px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 6px solid var(--md-gold); }
        .prize-icon { font-size: 1.5rem; margin-right: 15px; }
        
        .match-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .team-logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }
        .score-box { background: #f1f1f1; border-radius: 15px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; }
        .btn-adjust { width: 40px; height: 40px; border-radius: 12px; border: 2px solid #eee; background: white; font-weight: 800; }
        
        .gg-input { background: #fff; border: 2px solid var(--md-red); border-radius: 18px; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: 800; width: 100%; color: var(--md-red); }
        
        .extra-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-check:checked + .btn-outline-danger { background-color: var(--md-red); color: white; }
        
        .footer-action { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 20px 20px 30px 20px; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08); 
            z-index: 1000; 
        }
        .btn-submit { background: var(--md-red); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; }
        
        .rules-badge { border-left: 5px solid var(--md-red); background: #fffcfc; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="fw-800 m-0">{{ group[1] }}</h1>
    </div>

    <div class="container" style="max-width: 500px;">
        
        <div class="prize-card shadow-sm">
            <div class="prize-icon">🎁</div>
            <div>
                <div class="small fw-800 text-muted text-uppercase" style="font-size: 0.6rem;">Rundens Premie</div>
                <div class="fw-800 m-0" style="font-size: 1.1rem;">{{ group[5] or 'Ære og berømmelse' }}</div>
            </div>
        </div>

        <div class="match-card p-3 mb-4 rules-badge text-center">
            <h6 class="fw-800 text-uppercase small mb-2">Poengsystem:</h6>
            <div class="d-flex justify-content-between mt-2">
                <div><div class="fw-800 h5 m-0">3p</div><div class="small text-muted fw-bold" style="font-size: 0.55rem;">SCORE</div></div>
                <div><div class="fw-800 h5 m-0">1p</div><div class="small text-muted fw-bold" style="font-size: 0.55rem;">HUB</div></div>
                <div><div class="fw-800 h5 m-0" style="color: var(--md-red)">+5p</div><div class="small text-muted fw-bold" style="font-size: 0.55rem;">GG TREFF</div></div>
                <div><div class="fw-800 h5 m-0" style="color: #28a745">+2p</div><div class="small text-muted fw-bold" style="font-size: 0.55rem;">GG NÆRMEST</div></div>
            </div>
        </div>

        {% for k in kamper %}
        <div class="match-card text-center match-row" data-id="{{ k[0] }}">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div style="width: 35%;">
                    <img src="{{ k[4] }}" class="team-logo"><br>
                    <span class="fw-800 small">{{ k[2] }}</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="score-box h-score">0</div>
                    <div class="fw-800 text-muted">:</div>
                    <div class="score-box a-score">0</div>
                </div>
                <div style="width: 35%;">
                    <img src="{{ k[5] }}" class="team-logo"><br>
                    <span class="fw-800 small">{{ k[3] }}</span>
                </div>
            </div>
            <div class="d-flex justify-content-center gap-5">
                <div class="d-flex gap-2">
                    <button class="btn-adjust" onclick="adj(this, 'h', -1)">-</button>
                    <button class="btn-adjust" onclick="adj(this, 'h', 1)">+</button>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn-adjust" onclick="adj(this, 'a', -1)">-</button>
                    <button class="btn-adjust" onclick="adj(this, 'a', 1)">+</button>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="match-card">
            <label class="fw-800 small text-uppercase text-muted d-block text-center mb-3">Golden Goal (Første målminutt)</label>
            <input type="number" id="golden-goal" class="gg-input" placeholder="Minutt: Eks 24">
        </div>

        {% if questions %}
        <div class="extra-card">
            <h6 class="fw-800 text-uppercase small text-muted mb-4 text-center">Tilleggsspørsmål</h6>
            {% for q in questions %}
            <div class="mb-4 extra-q-row" data-qid="{{ q[0] }}">
                <label class="fw-bold d-block mb-3 text-center">{{ q[1] }}</label>
                <div class="d-flex justify-content-center gap-3">
                    <input type="radio" class="btn-check" name="q{{ q[0] }}" id="q{{ q[0] }}y" value="JA">
                    <label class="btn btn-outline-danger fw-bold px-4 py-2 rounded-pill" for="q{{ q[0] }}y">JA</label>

                    <input type="radio" class="btn-check" name="q{{ q[0] }}" id="q{{ q[0] }}n" value="NEI" checked>
                    <label class="btn btn-outline-danger fw-bold px-4 py-2 rounded-pill" for="q{{ q[0] }}n">NEI</label>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="footer-action">
        <div class="container" style="max-width: 460px;">
            <input type="text" id="user-name" class="form-control mb-3 p-3 fw-bold shadow-sm" placeholder="Ditt navn..." style="border-radius:15px; border: 1px solid #eee;">
            <button class="btn-submit shadow-lg" onclick="sendTips()">Lagre mine tips 🚀</button>
        </div>
    </div>

    <script>
        function adj(btn, side, d) {
            const card = btn.closest('.match-row');
            const el = card.querySelector('.' + side + '-score');
            let val = parseInt(el.innerText) + d;
            if (val >= 0) el.innerText = val;
        }

        async function sendTips() {
            const name = document.getElementById('user-name').value;
            const gg = document.getElementById('golden-goal').value;
            
            if(!name) return alert("Husk navn!");
            if(!gg) return alert("Husk Golden Goal-minutt!");
            
            const tips = [];
            document.querySelectorAll('.match-row').forEach(row => {
                tips.push({
                    match_id: row.getAttribute('data-id'),
                    h: row.querySelector('.h-score').innerText,
                    a: row.querySelector('.a-score').innerText
                });
            });

            const extras = {};
            document.querySelectorAll('.extra-q-row').forEach(row => {
                const qid = row.getAttribute('data-qid');
                const selected = row.querySelector('input:checked');
                if(selected) {
                    extras[qid] = selected.value;
                }
            });

            try {
                const response = await fetch('/api/submit_tips', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        group_id: '{{ group[2] }}',
                        user_name: name,
                        tips: tips,
                        golden_goal: gg,
                        extras: extras
                    })
                });
                
                if (response.ok) {
                    window.location.href = "/group/{{ group[2] }}/leaderboard";
                } else {
                    alert("Noe gikk galt ved lagring. Prøv igjen.");
                }
            } catch (err) {
                console.error(err);
                alert("Kunne ikke koble til serveren.");
            }
        }
    </script>
</body>
</html>
