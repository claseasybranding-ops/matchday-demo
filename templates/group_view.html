<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .score-input { width: 60px; height: 60px; font-size: 1.5rem; font-weight: 800; text-align: center; border: 2px solid #eee; border-radius: 12px; }
        .golden-input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #cc0000; font-weight: 800; text-align: center; }
        .btn-save { background: #cc0000; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; position: fixed; bottom: 20px; left: 0; right: 0; max-width: 440px; margin: auto; }
    </style>
</head>
<body>
    <div class="container mt-4" style="max-width: 480px;">
        <h2 class="fw-800 text-center mb-4">{{ group[1] }}</h2>

        {% for k in kamper %}
        <div class="card p-4 text-center match-row" data-id="{{ k[0] }}">
            <div class="d-flex justify-content-between align-items-center">
                <div class="fw-bold">{{ k[2] }}</div>
                <div class="d-flex gap-2">
                    <input type="number" class="score-input h-score" value="0">
                    <input type="number" class="score-input a-score" value="0">
                </div>
                <div class="fw-bold">{{ k[3] }}</div>
            </div>
        </div>
        {% endfor %}

        <div class="card p-4">
            <label class="fw-bold small text-uppercase text-muted d-block text-center mb-2">TIE-BREAKER: GOLDEN GOAL</label>
            <input type="number" id="golden-goal" class="golden-input" placeholder="Hvilket minutt scores første mål?">
        </div>

        {% if questions %}
        <div class="card p-4">
            <h6 class="fw-800 mb-3">TILLEGGSSVAR</h6>
            {% for q in questions %}
            <div class="mb-3 q-row" data-qid="{{ q[0] }}">
                <p class="small fw-bold mb-2">{{ q[1] }}</p>
                <div class="btn-group w-100">
                    <input type="radio" class="btn-check" name="q{{ q[0] }}" id="y{{ q[0] }}" value="JA">
                    <label class="btn btn-outline-dark fw-bold" for="y{{ q[0] }}">JA</label>
                    <input type="radio" class="btn-check" name="q{{ q[0] }}" id="n{{ q[0] }}" value="NEI" checked>
                    <label class="btn btn-outline-dark fw-bold" for="n{{ q[0] }}">NEI</label>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <input type="text" id="user-name" class="form-control p-3 fw-bold mb-4" placeholder="DITT NAVN..." style="border-radius:15px;">
        <button class="btn-save shadow-lg" onclick="sendTips()">SEND TIPS 🚀</button>
    </div>

    <script>
        function sendTips() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Navn mangler!");
            const tips = [];
            document.querySelectorAll('.match-row').forEach(row => {
                tips.push({ match_id: row.dataset.id, h: row.querySelector('.h-score').value, a: row.querySelector('.a-score').value });
            });
            const extras = {};
            document.querySelectorAll('.q-row').forEach(row => {
                extras[row.dataset.qid] = row.querySelector('input:checked').value;
            });

            fetch('/api/submit_tips', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ group_id: '{{ group[2] }}', user_name: name, tips: tips, golden_goal: document.getElementById('golden-goal').value, extras: extras })
            }).then(() => window.location.href = "/group/{{ group[2] }}/leaderboard");
        }
    </script>
</body>
</html>
