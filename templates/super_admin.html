<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | System Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--md-dark); }
        .navbar { background: white; padding: 20px 0; border-bottom: 1px solid #eee; }
        .admin-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .btn-create { background: var(--md-red); color: white; border: none; padding: 15px; border-radius: 14px; font-weight: 800; text-transform: uppercase; transition: 0.3s; width: 100%; }
        .btn-create:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(204, 0, 0, 0.2); }
        .match-table th { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; border: none; }
        .match-table td { font-weight: 700; font-size: 0.85rem; padding: 15px 10px; border-bottom: 1px solid #f1f1f1; }
        .status-badge { font-size: 0.6rem; padding: 4px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        .status-upcoming { background: #eef2ff; color: #4338ca; }
    </style>
</head>
<body>
    <nav class="navbar mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-800">MATCHDAY. <span class="text-muted fw-400" style="font-size: 0.8rem;">SYSTEM ADMIN</span></h4>
            <button class="btn btn-dark fw-800 px-4 rounded-pill">INVESTOR MODUS</button>
        </div>
    </nav>

    <div class="container" style="max-width: 1000px;">
        <div class="admin-card">
            <h6 class="text-uppercase text-muted fw-800 mb-4" style="font-size: 0.7rem; letter-spacing: 1px;">Opprett ny kunde / supporterklubb</h6>
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="new-group-name" class="form-control p-3 fw-bold" placeholder="TV2" style="background: #eef2ff; border: none; border-radius: 12px;">
                </div>
                <div class="col-md-4">
                    <input type="text" id="new-group-admin" class="form-control p-3 fw-bold" placeholder="Clas Thomas" style="background: #eef2ff; border: none; border-radius: 12px;">
                </div>
                <div class="col-md-4">
                    <button class="btn-create" onclick="createGroup()">OPPRETT 🚀</button>
                </div>
            </div>
        </div>

        <div class="admin-card">
            <h6 class="text-uppercase text-muted fw-800 mb-4" style="font-size: 0.7rem; letter-spacing: 1px;">Aktive supporterklubber</h6>
            <div id="group-list">
                {% for g in grupper %}
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 shadow-sm" style="background: white; border-radius: 16px; border: 1px solid #eee;">
                    <span class="fw-800">{{ g[1] }} <span class="text-muted fw-400 ms-2">| Admin: {{ g[3] }}</span></span>
                    <a href="/group/{{ g[2] }}/admin" class="btn btn-outline-dark btn-sm fw-800 px-4 rounded-pill">ADMIN PANEL</a>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="text-uppercase text-muted fw-800 m-0" style="font-size: 0.7rem; letter-spacing: 1px;">Globalt kamp-lager (PL)</h6>
                <button class="btn btn-outline-danger btn-sm fw-800" onclick="importPL()">Hent ferske kamper</button>
            </div>
            <div class="table-responsive">
                <table class="table match-table">
                    <thead>
                        <tr>
                            <th>Dato</th>
                            <th>Kamp</th>
                            <th class="text-end">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for k in kamper %}
                        <tr>
                            <td>{{ k[6] }}</td>
                            <td>{{ k[2] }} – {{ k[3] }}</td>
                            <td class="text-end"><span class="status-badge status-upcoming">{{ k[7] }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function createGroup() {
            const name = document.getElementById('new-group-name').value;
            const admin = document.getElementById('new-group-admin').value;
            if(!name || !admin) return alert("Fyll ut begge felt!");

            fetch('/api/create_group', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name, admin_name: admin })
            })
            .then(res => res.json())
            .then(data => {
                alert("Gruppe opprettet!");
                window.location.reload();
            });
        }

        function importPL() {
            if(confirm("Dette sletter alle eksisterende tips og starter runden på nytt. Er du sikker?")) {
                fetch('/api/import_league/PL').then(() => window.location.reload());
            }
        }
    </script>
</body>
</html>
