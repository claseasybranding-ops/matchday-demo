<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchDay | System Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: sans-serif; }
        .investor-box { background: #fff1f2; border: 2px solid var(--md-red); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
    </style>
</head>
<body class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold">System Admin</h1>
        <span class="badge bg-danger">INVESTOR MODUS</span>
    </div>

    <div class="investor-box shadow">
        <h5 class="fw-bold text-danger mb-3">Demo-kontroll: Push resultater</h5>
        <div class="table-responsive">
            <table class="table table-sm table-borderless">
                <tbody id="push-list">
                    {% for k in kamper %}
                    <tr data-id="{{ k[0] }}">
                        <td><small>{{ k[2] }} - {{ k[3] }}</small></td>
                        <td><input type="number" class="h-score form-control form-control-sm" style="width:50px" value="{{ k[8] or 0 }}"></td>
                        <td><input type="number" class="b-score form-control form-control-sm" style="width:50px" value="{{ k[9] or 0 }}"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <button class="btn btn-danger w-100 fw-bold" onclick="pushResults()">PUSH RESULTATER TIL ALLE GRUPPER</button>
    </div>

    <div class="card p-3 shadow-sm border-0">
        <h6 class="fw-bold">Aktive Supporterklubber</h6>
        {% for g in grupper %}
        <div class="d-flex justify-content-between border-bottom py-2">
            <span>{{ g[1] }}</span>
            <a href="/group/{{ g[2] }}/admin" class="btn btn-sm btn-outline-dark">Gå til Kåres Admin</a>
        </div>
        {% endfor %}
    </div>

<script>
    function pushResults() {
        const sc = [];
        document.querySelectorAll('#push-list tr').forEach(r => {
            sc.push({match_id: r.getAttribute('data-id'), h: r.querySelector('.h-score').value, b: r.querySelector('.b-score').value});
        });
        fetch('/api/admin_push_scores', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({scores:sc})}).then(()=>alert("Resultater pushet live!"));
    }
</script>
</body>
</html>
