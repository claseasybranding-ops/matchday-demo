<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>System-Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; }
        .card { background: #2d2d2d; color: white; border: none; margin-bottom: 20px; }
        .btn-danger { background: #cc0000; border: none; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h1 class="fw-bold text-danger mb-4">MatchDay.</h1>
        
        <div class="card p-4">
            <h5>Opprett Ny Gruppe</h5>
            <div class="row g-2">
                <div class="col-md-5"><input type="text" id="gName" class="form-control bg-dark text-white border-secondary" placeholder="Gruppenavn"></div>
                <div class="col-md-4"><input type="text" id="aName" class="form-control bg-dark text-white border-secondary" placeholder="Admin navn"></div>
                <div class="col-md-3"><button class="btn btn-danger w-100" onclick="createGroup()">Opprett</button></div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between">
                <h5>Kamp-lageret</h5>
                <div>
                    <button class="btn btn-sm btn-outline-light" onclick="importL('PL')">Hent Premier League</button>
                    <button class="btn btn-sm btn-outline-light" onclick="importL('CL')">Hent Champions League</button>
                </div>
            </div>
            <div class="mt-3">
                {% for k in kamper %}
                <div class="small border-bottom border-secondary py-1">{{ k[2] }} vs {{ k[3] }} ({{ k[6][:10] }})</div>
                {% endfor %}
            </div>
        </div>

        <div class="card p-4">
            <h5>Aktive Grupper</h5>
            {% for g in grupper %}
            <div class="d-flex justify-content-between border-bottom border-secondary py-2">
                <span><strong>{{ g[1] }}</strong> (Leder: {{ g[3] }})</span>
                <div>
                    <a href="/group/{{ g[2] }}/admin" class="btn btn-sm btn-light">Plukk kamper</a>
                    <a href="/group/{{ g[2] }}" class="btn btn-sm btn-outline-danger">Se vegg</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function createGroup() {
            const name = document.getElementById('gName').value;
            const admin = document.getElementById('aName').value;
            fetch('/api/create_group', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, admin_name: admin})
            }).then(res => res.json()).then(data => location.reload());
        }
        function importL(code) {
            fetch('/api/import_league/' + code)
            .then(res => res.json())
            .then(data => {
                if(data.status === "Suksess") location.reload();
                else alert("Feil: " + data.status);
            });
        }
    </script>
</body>
</html>
