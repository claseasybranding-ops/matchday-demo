<div id="match-list">
    {% if kamper|length == 0 %}
        <p class="text-center text-muted py-5">Ingen kamper i databasen ennå. Trykk på "Hent" over.</p>
    {% endif %}

    {% for k in kamper %}
    <div class="row match-row align-items-center bg-white mb-2 p-3 rounded shadow-sm">
        <div class="col-md-2 text-muted small">
            {{ k[6][:10] }} </div>
        <div class="col-md-4 text-end">
            <span class="fw-bold">{{ k[2] }}</span>
            <img src="{{ k[4] }}" class="logo-sm ms-2">
        </div>
        <div class="col-md-1 text-center fw-bold text-danger">VS</div>
        <div class="col-md-4 text-start">
            <img src="{{ k[5] }}" class="logo-sm me-2">
            <span class="fw-bold">{{ k[3] }}</span>
        </div>
        <div class="col-md-1 text-center">
            <button class="btn btn-sm btn-outline-success">Aktiver</button>
        </div>
    </div>
    {% endfor %}
</div>
