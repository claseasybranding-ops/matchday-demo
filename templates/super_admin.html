<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .navbar { background: #1a1a1a; border-bottom: 2px solid #cc0000; padding: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-header { border-bottom: 1px solid #333; padding: 20px; font-weight: bold; color: #cc0000; text-transform: uppercase; letter-spacing: 1px; }
        .btn-danger { background: #cc0000; border: none; font-weight: bold; padding: 10px 25px; border-radius: 8px; }
        .btn-outline-light { border-color: #444; color: #aaa; }
        .btn-outline-light:hover { background: #cc0000; border-color: #cc0000; color: white; }
        .match-row { border-bottom: 1px solid #2a2a2a; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .match-row:last-child { border-bottom: none; }
        .group-item { background: #252525; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #cc0000; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; }
        .form-control:focus { background: #333; color: white; border-color: #cc0000; box-shadow: none; }
    </style>
</head>
<body>

<nav class="navbar mb-5">
    <div class="container">
        <h2 class="fw-bold m-0" style="color: #cc0000;">MatchDay<span class="text-white">.</span></h2>
        <span class="badge bg-danger">SYSTEM ADMIN</span>
    </div>
</nav>

<div class="container" style="max-width: 900px;">
    
    <div class="card">
        <div class="card-header">Opprett Ny Gruppe / Kunde</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="gName" class="form-control" placeholder="Gruppenavn (f.eks. Liverbirds Fredrikstad)">
                </div>
                <div class="col-md-4">
                    <input type="text" id="aName" class="form-control" placeholder="Admin (f.eks. Clas T)">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-danger w-100" onclick="createGroup()">Opprett</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Aktive Grupper</div>
        <div class="card-body">
            {% for g in grupper %}
            <div class="group-item">
                <div>
                    <h6 class="fw-bold m-0">{{ g[1] }}</h6>
                    <small class="text-muted">Slug: /group/{{ g[2] }} | Leder: {{ g[3] }}</small>
                </div>
                <div class="d-flex gap-2">
                    <a href="/group/{{ g[2] }}/admin" class="btn btn-sm btn-light fw-bold">Plukk kamper</a>
                    <a href="/group/{{ g[2] }}" class="btn btn-sm btn-outline-danger fw-bold">Se vegg</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Kamp-lageret (Buffé)</span>
            <div>
                <button class="btn btn-sm btn-outline-light" onclick="importL('PL')">Hent Premier League</button>
                <button class="btn btn-sm btn-outline-light" onclick="importL('CL')">Hent Champions League</button>
            </div>
        </div>
        <div class="card-body p-0">
            {% for k in kamper %}
            <div class="match-row">
                <span class="small text-muted" style="width: 100px;">{{ k[6][:10] }}</span>
                <span class="fw-bold text-center flex-grow-1">{{ k[2] }} - {{ k[3] }}</span>
                <span class="badge bg-dark text-success border border-success">KLAR</span>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    function createGroup() {
        const name = document.getElementById('gName').value;
        const admin = document.getElementById('aName').value;
        fetch('/api/create_group', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, admin_name: admin})
        }).then(res => res.json()).then(() => location.reload());
    }
    function importL(code) {
        fetch('/api/import_league/' + code).then(() => location.reload());
    }
</script>

</body>
</html>
