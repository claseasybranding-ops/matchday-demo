<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f8f9fa; --md-gold: #FFD700; --nt-green: #008a46; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .leaderboard-container { max-width: 500px; margin: auto; }
        
        .live-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .live-dot { height: 8px; width: 8px; background-color: var(--md-red); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.6); opacity: 0; } 100% { opacity: 0; } }
        
        .prize-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 6px solid var(--md-gold); }
        .prize-icon { font-size: 2rem; margin-right: 20px; }
        
        .leaderboard-card { background: white; border-radius: 28px; box-shadow: 0 15px 45px rgba(0,0,0,0.07); overflow: hidden; }
        .user-row { cursor: pointer; border-bottom: 1px solid #f8f8f8; transition: 0.2s; }
        .rank-box { width: 32px; height: 32px; background: #f1f1f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        tr:nth-child(1) .rank-box { background: var(--md-gold); color: white; }
        
        .points-cell { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .points-display { font-weight: 800; color: var(--md-red); font-size: 1.2rem; }
        .chevron { width: 16px; height: 16px; transition: transform 0.3s; color: #bbb; stroke: currentColor; stroke-width: 3; fill: none; }
        .open .chevron { transform: rotate(180deg); color: var(--md-red); }

        .details-row { display: none; background: #fafafa; }
        .bet-mini-card { background: white; border-radius: 16px; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .team-box { width: 30%; text-align: center; }
        .team-box img { width: 25px; height: 25px; object-fit: contain; }
        .team-box span { display: block; font-size: 0.65rem; font-weight: 800; margin-top: 4px; }
        
        /* ODDS-TRIGGER MODUL */
        .nt-odds-box { 
            background: var(--nt-green); 
            color: white; 
            border-radius: 18px; 
            padding: 15px; 
            margin-top: 15px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 138, 70, 0.2);
            transition: 0.3s;
        }
        .nt-odds-box:hover { transform: translateY(-2px); color: white; opacity: 0.95; }
        .nt-logo-circle { width: 35px; height: 35px; background: white; color: var(--nt-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.7rem; margin-right: 12px; }
        .odds-val { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 10px; font-weight: 800; font-size: 1.1rem; }
        
        .extra-box { background: #fff5f5; border-radius: 12px; padding: 12px; margin-top: 15px; }
        .extra-line { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 6px 0; border-bottom: 1px solid #ffebeb; }
        .extra-line:last-child { border: none; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-4">
            <div class="live-status">
                <span class="live-dot"></span>
                <span class="fw-800 small text-uppercase" style="color: var(--md-red);">Live Leaderboard</span>
            </div>
            <h1 class="fw-800 m-0">{{ group[1] }}</h1>
        </div>

        <div class="prize-card shadow-sm" id="live-ticker">
            <div class="prize-icon" id="ticker-icon">🎁</div>
            <div>
                <div class="small fw-800 text-muted text-uppercase" id="ticker-label" style="font-size: 0.65rem;">Rundens Premie</div>
                <div class="fw-800 h5 m-0" id="ticker-text">{{ group[5] or 'Middag' }}</div>
            </div>
        </div>
        
        <div class="leaderboard-card">
            <table class="table mb-0">
                <thead>
                    <tr class="small text-muted text-uppercase">
                        <th class="ps-4">Pos</th>
                        <th>Deltaker</th>
                        <th class="text-end pe-4">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="user-row" onclick="toggleDetails('{{ loop.index }}', '{{ row[0] }}')">
                        <td class="ps-4" style="width: 70px;"><div class="rank-box">{{ loop.index }}</div></td>
                        <td><span class="fw-800">{{ row[0] }}</span></td>
                        <td class="pe-4">
                            <div class="points-cell">
                                <svg class="chevron" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                <span class="points-display">{{ row[1] }}p</span>
                            </div>
                        </td>
                    </tr>
                    <tr class="details-row" id="details-{{ loop.index }}">
                        <td colspan="3"><div class="p-3" id="content-{{ loop.index }}"></div></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function toggleDetails(index, user) {
            const detailRow = document.getElementById(`details-${index}`);
            const userRow = detailRow.previousElementSibling;
            const content = document.getElementById(`content-${index}`);

            if (detailRow.style.display === 'table-row') {
                detailRow.style.display = 'none';
                userRow.classList.remove('open');
                return;
            }

            // Lukk andre rader
            document.querySelectorAll('.details-row').forEach(row => row.style.display = 'none');
            document.querySelectorAll('.user-row').forEach(row => row.classList.remove('open'));

            detailRow.style.display = 'table-row';
            userRow.classList.add('open');
            content.innerHTML = '<div class="text-center p-2 small">Henter live-data...</div>';
            
            fetch(`/api/get_user_bets/{{ group[2] }}/${user}`)
            .then(res => res.json())
            .then(data => {
                let html = '<div class="details-inner">';
                
                // Kampene brukeren har tippet
                data.main.forEach(b => {
                    let pDesc = b.pts >= 3 ? "3p - Riktig" : (b.pts >= 1 ? "1p - HUB" : "0p");
                    html += `
                        <div class="bet-mini-card shadow-sm mb-2">
                            <div class="d-flex align-items-center justify-content-between">
                                <div class="team-box"><img src="${b.hl}"><span>${b.ht}</span></div>
                                <div class="text-center fw-800" style="width:40%;">${b.h} - ${b.a}<br><span class="badge bg-danger" style="font-size:0.5rem;">${pDesc}</span></div>
                                <div class="team-box"><img src="${b.al}"><span>${b.at}</span></div>
                            </div>
                        </div>`;
                });

                // Ekstra-info (Golden Goal og Tillegg)
                html += '<div class="extra-box">';
                if(data.main[0].gg > 0) html += `<div class="extra-line"><span>Mitt Golden Goal:</span><b>${data.main[0].gg}. min</b></div>`;
                
                let targetPlayer = "";
                data.extras.forEach(e => {
                    html += `<div class="extra-line"><span>${e.q}</span><b>${e.ans}</b></div>`;
                    // Sjekker om det er et målscorer-spørsmål for odds-demo
                    if(e.q.toLowerCase().includes("mål") || e.q.toLowerCase().includes("scorer")) targetPlayer = e.ans;
                });
                html += '</div>';

                // --- INVESTOR DEMO: NORSK TIPPING ODDS ---
                if(targetPlayer && targetPlayer !== "Ingen") {
                    let randomOdds = (Math.random() * (7.0 - 2.5) + 2.5).toFixed(2);
                    html += `
                    <a href="https://www.norsk-tipping.no/sport" target="_blank" class="nt-odds-box">
                        <div class="d-flex align-items-center">
                            <div class="nt-logo-circle">NT</div>
                            <div>
                                <div style="font-size: 0.55rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">Norsk Tipping Live</div>
                                <div style="font-size: 0.85rem; font-weight: 800;">Scorer ${targetPlayer} nå?</div>
                            </div>
                        </div>
                        <div class="odds-val">${randomOdds}</div>
                    </a>`;
                }

                // Oppdater ticker-boksen øverst live hvis GG er registrert
                if(data.gg_live > 0) {
                    const ticker = document.getElementById('live-ticker');
                    ticker.style.borderLeft = "6px solid #cc0000";
                    document.getElementById('ticker-icon').innerHTML = "🎯";
                    document.getElementById('ticker-label').innerHTML = "LIVE: Golden Goal";
                    document.getElementById('ticker-text').innerHTML = `${data.gg_live}. min - ${data.gg_winner} leder!`;
                }

                content.innerHTML = html + '</div>';
            });
        }
        // Auto-refresh hvert minutt
        setInterval(() => { window.location.reload(); }, 60000);
    </script>
</body>
</html>
