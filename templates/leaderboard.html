<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabell | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #333; }
        
        .leaderboard-container { max-width: 500px; margin: 40px auto; padding: 20px; }
        
        /* Leaderboard Card */
        .leaderboard-card { 
            background: white; 
            border-radius: 20px; 
            border: 1px solid rgba(0,0,0,0.05); 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .table thead { background: #fdfdfd; }
        .table th { 
            padding: 20px; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
            color: #888;
            border-bottom: 2px solid #f1f1f1;
        }

        .table td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f8f8f8; cursor: pointer; } /* Lagt til cursor: pointer */

        /* Rank styling */
        .rank-badge { 
            width: 35px; height: 35px; 
            background: #f1f1f1; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 0.9rem;
        }

        .rank-1 { background-color: rgba(204, 0, 0, 0.03); }
        .rank-1 .rank-badge { 
            background: #FFD700; 
            color: #000; 
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .points-col { 
            font-weight: 800; 
            text-align: right; 
            font-size: 1.2rem; 
            color: var(--md-dark);
        }

        /* Live indicator pulse */
        .live-dot {
            height: 8px; width: 8px;
            background-color: var(--md-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(204, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }

        .btn-outline-custom { 
            border: 2px solid #eee; 
            color: #444; 
            font-weight: 700; 
            border-radius: 14px; 
            padding: 15px;
            transition: 0.3s;
            background: white;
        }
        .btn-outline-custom:hover { border-color: var(--md-red); color: var(--md-red); }

        .refresh-notice { text-align: center; font-size: 0.7rem; color: #bbb; margin-top: 25px; font-weight: 600; }

        /* Modal (Popup) Styling - Din stil */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .modal-header {
            border-bottom: 1px solid #eee;
            padding: 25px;
        }
        .modal-title {
            font-weight: 800;
            letter-spacing: -1px;
        }
        .modal-body {
            padding: 25px;
        }
        .match-bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f8f8f8;
        }
        .match-bet-row:last-child {
            border-bottom: none;
        }
        .team-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
            margin: 0 8px;
        }
        .bet-score {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--md-dark);
            background: #f1f1f1;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .bet-points {
            font-weight: 800;
            font-size: 0.8rem;
            color: white;
            background: var(--md-red); /* MatchDay rød for poeng */
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-5">
            <h1 class="fw-800 mb-1" style="letter-spacing: -1px;">{{ group[1] }}</h1>
            <div class="d-flex align-items-center justify-content-center">
                <span class="live-dot"></span>
                <span class="small fw-bold text-uppercase tracking-wider" style="color: var(--md-red);">Live Leaderboard</span>
            </div>
        </div>
        
        <div class="leaderboard-card">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th style="width: 80px;">Rank</th>
                        <th>Deltaker</th>
                        <th class="text-end">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="{% if loop.first %}rank-1{% endif %}" onclick="openBetsModal('{{ row[0] }}')">
                        <td><div class="rank-badge">{{ loop.index }}</div></td>
                        <td>
                            <div class="fw-bold">{{ row[0] }}</div>
                            {% if loop.first %}<small class="text-muted fw-bold" style="font-size: 0.6rem; text-transform: uppercase;">Leader</small>{% endif %}
                        </td>
                        <td class="points-col">{{ row[1] }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" class="text-center py-5 text-muted">Venter på første tips...</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <p class="refresh-notice text-uppercase">Neste automatiske oppdatering om et øyeblikk...</p>
        
        <div class="mt-4">
            <a href="/group/{{ group[2] }}" class="btn btn-outline-custom w-100 text-decoration-none d-block text-center shadow-sm">
                ← ENDRE MINE TIPS
            </a>
        </div>
    </div>

    <div class="modal fade" id="betsModal" tabindex="-1" aria-labelledby="betsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-content modal-title" id="betsModalLabel">Tips for <span id="modalUserName" style="color:var(--md-red)"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBetsBody">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Funksjon for å åpne modalen og fylle den med data
        function openBetsModal(userName) {
            document.getElementById('modalUserName').innerText = userName;
            const modalBody = document.getElementById('modalBetsBody');
            modalBody.innerHTML = '<p class="text-center text-muted">Henter tips...</p>'; // Loading melding

            // Hent tipsdata fra API-en (vi bruker eksisterende data fra leaderboard-ruten)
            // Siden vi ikke endrer app.py, må vi bruke dataene vi har tilgjengelig.
            // I en fullversjon ville vi hatt en egen API-rute for dette.
            // For demoen simulerer vi dette ved å bruke dataene fra tabellen.
            
            // Dette er en forenkling for demoen. I en ekte app ville du hentet
            // spesifikke tips for brukeren via en API-rute som f.eks. `/api/get_user_bets/[user_id]`.
            
            // For nå, la oss bare vise en statisk liste for å demonstrere designet.
            // Du må erstatte dette med ekte datafangst senere.
            const sampleBets = [
                { home: 'Arsenal', away: 'Man City', homeLogo: 'https://crests.football-data.org/57.png', awayLogo: 'https://crests.football-data.org/65.png', bet: '2-1', points: 3 },
                { home: 'Liverpool', away: 'Chelsea', homeLogo: 'https://crests.football-data.org/64.png', awayLogo: 'https://crests.football-data.org/61.png', bet: '1-1', points: 1 },
                { home: 'Man Utd', away: 'Spurs', homeLogo: 'https://crests.football-data.org/66.png', awayLogo: 'https://crests.football-data.org/73.png', bet: '0-2', points: 0 }
            ];

            let html = '';
            sampleBets.forEach(bet => {
                html += `
                    <div class="match-bet-row">
                        <div class="d-flex align-items-center">
                            <img src="${bet.homeLogo}" class="team-logo" alt="${bet.home}">
                            <span class="fw-bold small">${bet.home}</span>
                            <span class="mx-2 text-muted">-</span>
                            <span class="fw-bold small">${bet.away}</span>
                            <img src="${bet.awayLogo}" class="team-logo" alt="${bet.away}">
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="bet-score">${bet.bet}</div>
                            ${bet.points > 0 ? `<div class="bet-points">${bet.points}P</div>` : ''}
                        </div>
                    </div>
                `;
            });
            modalBody.innerHTML = html;

            const myModal = new bootstrap.Modal(document.getElementById('betsModal'));
            myModal.show();
        }

        function refreshLeaderboard() {
            fetch('/api/refresh_data')
                .then(res => res.json())
                .then(data => {
                    if (data.status === "OK") {
                        location.reload(); 
                    }
                })
                .catch(err => console.log("Kunne ikke koble til server"));
        }
        // Oppdaterer hvert 2. minutt i demo-modus for å virke mer "snappy"
        setInterval(refreshLeaderboard, 120000); 
    </script>
</body>
</html>
