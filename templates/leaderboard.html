<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; --md-gold: #FFD700; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--md-dark); }
        .leaderboard-container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .live-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .live-dot { height: 8px; width: 8px; background-color: var(--md-red); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.6); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
        .prize-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 6px solid var(--md-gold); }
        .prize-icon { font-size: 2rem; margin-right: 20px; }
        .leaderboard-card { background: white; border-radius: 28px; box-shadow: 0 15px 45px rgba(0,0,0,0.07); overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .table thead th { background: #fafafa; border-bottom: 1px solid #eee; padding: 15px 20px; font-size: 0.75rem; text-transform: uppercase; color: #888; }
        .user-row { cursor: pointer; transition: 0.2s; }
        .user-row td { padding: 18px 20px; vertical-align: middle; border-bottom: 1px solid #f8f8f8; }
        .rank-box { width: 32px; height: 32px; background: #f1f1f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; }
        tr:nth-child(1) .rank-box { background: var(--md-gold); color: white; }
        .points-display { font-weight: 800; color: var(--md-red); font-size: 1.2rem; }
        .details-row { display: none; background: #fafafa; }
        .bet-mini-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .team-box img { width: 25px; height: 25px; object-fit: contain; }
        .footer-info { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="leaderboard-container">
        <div class="text-center mb-4">
            <div class="live-status">
                <span class="live-dot"></span>
                <span class="fw-800 small text-uppercase" style="color: var(--md-red); letter-spacing: 1px;">Live Leaderboard</span>
            </div>
            <h1 class="fw-800 mb-1">{{ group[1] }}</h1>
            <div class="text-muted small fw-800 text-uppercase" style="letter-spacing: 1px;">Konkurransestart: {{ start_time }}</div>
        </div>

        <div class="prize-card shadow-sm">
            <div class="prize-icon">🎁</div>
            <div>
                <div class="small fw-800 text-muted text-uppercase" style="font-size: 0.65rem;">Rundens Premie</div>
                <div class="fw-800 h5 m-0">{{ group[5] or 'Ære og berømmelse' }}</div>
            </div>
        </div>
        
        <div class="leaderboard-card">
            <table class="table">
                <thead>
                    <tr>
                        <th class="ps-4">Pos</th>
                        <th>Deltaker</th>
                        <th class="text-end pe-4">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="user-row" onclick="toggleDetails('{{ loop.index }}', '{{ row[0] }}')">
                        <td class="ps-4" style="width: 70px;"><div class="rank-box">{{ loop.index }}</div></td>
                        <td><span class="fw-700">{{ row[0] }}</span></td>
                        <td class="pe-4 text-end"><span class="points-display">{{ row[1] }}p</span></td>
                    </tr>
                    <tr class="details-row" id="details-{{ loop.index }}">
                        <td colspan="3">
                            <div class="details-content p-3" id="content-{{ loop.index }}"></div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="footer-info">Tabellen oppdateres automatisk hvert 2. minutt</div>
    </div>

    <script>
        function toggleDetails(index, user) {
            const detailRow = document.getElementById(`details-${index}`);
            const content = document.getElementById(`content-${index}`);
            if (detailRow.style.display === 'table-row') {
                detailRow.style.display = 'none';
                return;
            }
            document.querySelectorAll('.details-row').forEach(row => row.style.display = 'none');
            detailRow.style.display = 'table-row';
            content.innerHTML = '<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-danger"></div></div>';
            
            fetch(`/api/get_user_bets/{{ group[2] }}/${user}`)
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.main.forEach(b => {
                    html += `<div class="bet-mini-card shadow-sm">
                        <div class="text-center" style="width:35%"><img src="${b.hl}"><br><span class="small fw-bold">${b.ht}</span></div>
                        <div class="fw-800 h5">${b.h} - ${b.a}</div>
                        <div class="text-center" style="width:35%"><img src="${b.al}"><br><span class="small fw-bold">${b.at}</span></div>
                    </div>`;
                });
                if(data.main[0]?.gg) html += `<div class="p-2 bg-light rounded mb-2 small fw-bold">Golden Goal: ${data.main[0].gg}. min</div>`;
                content.innerHTML = html;
            });
        }
        setInterval(() => { location.reload(); }, 120000);
    </script>
</body>
</html>
