<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | MatchDay Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-bg: #f4f7f6; --md-gold: #FFD700; --md-dark: #1a1a1a; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; color: var(--md-dark); }
        .leaderboard-container { max-width: 500px; margin: auto; }

        /* Live Status */
        .status-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-waiting { background: #ced4da; }
        .dot-live { background: var(--md-red); animation: pulse 2s infinite; }
        .status-text { font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }

        .leaderboard-card { background: white; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .user-row { cursor: pointer; border-bottom: 1px solid #f1f1f1; transition: 0.3s; }
        .rank-box { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        .rank-1 { background: #fff9db; color: #fab005; }
        .rank-other { background: #f8f9fa; color: #adb5bd; }

        .trend-stay { color: #fcc419; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .trend-line { width: 12px; height: 3px; background-color: #fcc419; border-radius: 2px; }

        .points-display { font-weight: 800; font-size: 1.4rem; }
        .chevron { width: 18px; height: 18px; transition: transform 0.3s; color: #ced4da; }
        .open .chevron { transform: rotate(180deg); color: var(--md-red); }

        .details-row { display: none; background: #fafafa; }
        .bet-mini-card { background: white; border-radius: 16px; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .stats-box { background: var(--md-dark); color: white; border-radius: 20px; padding: 18px; margin: 10px 0; }
        .stats-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
        .stats-label { color: #aaa; text-transform: uppercase; }

        /* NORSK TIPPING ANNONSE */
        .nt-ad-container { background: white; border-radius: 20px; padding: 18px; border: 1px solid #eee; margin-top: 10px; }
        .nt-header { font-size: 0.6rem; color: #bbb; text-transform: uppercase; text-align: center; margin-bottom: 12px; letter-spacing: 2px; font-weight: 800; }
        .nt-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 15px; color: #222; }
        .nt-odds-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .nt-odds-btn { background: #f1f3f5; border: none; border-radius: 10px; flex: 1; padding: 10px 5px; text-align: center; text-decoration: none; color: #333; }
        .nt-label { font-size: 0.65rem; color: #777; display: block; margin-bottom: 2px; }
        .nt-val { font-weight: 800; font-size: 1.1rem; display: block; }
        .nt-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .nt-brand { color: #0055ff; font-weight: 900; font-style: italic; font-size: 1.1rem; display: flex; align-items: center; gap: 4px; }
        .nt-legal { font-size: 0.55rem; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-4">
            <div id="live-status" class="status-container">
                <span id="status-dot" class="dot dot-waiting"></span>
                <span id="status-label" class="status-text">Venter på kampstart</span>
            </div>
            <h1 class="fw-800 m-0" style="font-size: 2.2rem;">{{ group[1] }}</h1>
        </div>

        <div class="leaderboard-card">
            <table class="table table-borderless mb-0">
                <thead>
                    <tr class="small text-muted text-uppercase">
                        <th class="ps-4 py-3">#</th>
                        <th class="py-3">Deltaker</th>
                        <th class="text-end pe-4 py-3">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% set leader_points = leaderboard[0][1] if leaderboard else 0 %}
                    {% for row in leaderboard %}
                    <tr class="user-row" onclick="toggleDetails('{{ loop.index }}', '{{ row[0] }}')">
                        <td class="ps-4 align-middle" style="width: 75px;">
                            <div class="rank-box {% if loop.index == 1 %}rank-1{% else %}rank-other{% endif %}">
                                {% if loop.index == 1 %}🥇{% else %}{{ loop.index }}{% endif %}
                            </div>
                        </td>
                        <td class="align-middle">
                            <span class="fw-800 d-block" style="font-size: 1.1rem;">{{ row[0] }}</span>
                            <div class="trend-stay"><span class="trend-line"></span><span>Uendret</span></div>
                        </td>
                        <td class="pe-4 text-end align-middle">
                            <div class="d-flex align-items-center justify-content-end gap-3">
                                <span class="points-display">{{ row[1] }}</span>
                                <svg class="chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
                            </div>
                        </td>
                    </tr>
                    <tr class="details-row" id="details-{{ loop.index }}">
                        <td colspan="3"><div class="p-3" id="content-{{ loop.index }}"></div></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let loggedInUser = "{{ current_user }}";

        function toggleDetails(index, rowUser) {
            const detailRow = document.getElementById(`details-${index}`);
            const content = document.getElementById(`content-${index}`);
            const userRow = detailRow.previousElementSibling;

            if (detailRow.style.display === 'table-row') {
                detailRow.style.display = 'none';
                userRow.classList.remove('open');
                return;
            }

            document.querySelectorAll('.details-row').forEach(row => row.style.display = 'none');
            detailRow.style.display = 'table-row';
            userRow.classList.add('open');
            content.innerHTML = '<div class="text-center p-4 small">Laster...</div>';
            
            fetch(`/api/get_user_bets/{{ group[2] }}/${rowUser}`)
            .then(res => res.json())
            .then(data => {
                if(data.gg_live > 0) {
                    document.getElementById('status-dot').className = 'dot dot-live';
                    document.getElementById('status-label').innerText = 'LIVE OPPDATERING';
                }

                let html = '<div class="details-inner">';
                
                // KAMPENE
                data.main.forEach(b => {
                    html += `
                        <div class="bet-mini-card shadow-sm">
                            <div class="text-center" style="width:30%"><img src="${b.hl}" width="22"><span class="d-block small fw-800">${b.ht}</span></div>
                            <div class="text-center"><b class="h5 m-0">${b.h} - ${b.a}</b></div>
                            <div class="text-center" style="width:30%"><img src="${b.al}" width="22"><span class="d-block small fw-800">${b.at}</span></div>
                        </div>`;
                });

                // DEN SVARTE BOKSEN (Nå med både Golden Goal og Tillegg)
                html += '<div class="stats-box">';
                
                // Sjekk om GG er lagret for brukeren
                if(data.main[0] && data.main[0].gg > 0) {
                    html += `<div class="stats-line"><span class="stats-label">GOLDEN GOAL</span><span class="stats-val">${data.main[0].gg}. min</span></div>`;
                }

                let playerName = "";
                data.extras.forEach(e => {
                    html += `<div class="stats-line"><span class="stats-label">${e.q}</span><span class="stats-val">${e.ans}</span></div>`;
                    if(e.q.toLowerCase().includes("scorer") && e.ans === "JA") {
                        let m = e.q.match(/scorer\s+(.*?)\s*(\(|$|\?)/i);
                        if(m) playerName = m[1].trim();
                    }
                });
                html += '</div>';

                // REKLAME (Kun til deg selv)
                if(rowUser.trim().toLowerCase() === loggedInUser.trim().toLowerCase() && playerName !== "") {
                    html += `
                    <a href="https://www.norsk-tipping.no" target="_blank" style="text-decoration:none">
                        <div class="nt-ad-container shadow-sm border-0">
                            <div class="nt-header">ANNONSE</div>
                            <div class="nt-title">Scorer ${playerName} neste mål?</div>
                            <div class="nt-odds-row">
                                <div class="nt-odds-btn"><span class="nt-label">Ja</span><span class="nt-val">3.40</span></div>
                                <div class="nt-odds-btn"><span class="nt-label">Ingen</span><span class="nt-val">18.50</span></div>
                                <div class="nt-odds-btn"><span class="nt-label">Nei</span><span class="nt-val">1.25</span></div>
                            </div>
                            <div class="nt-footer">
                                <div class="nt-brand"><span>×</span> Oddsen</div>
                                <span class="nt-legal">18+ Hjelpelinjen.no</span>
                            </div>
                        </div>
                    </a>`;
                }

                content.innerHTML = html + '</div>';
            });
        }
        setInterval(() => { window.location.reload(); }, 60000);
    </script>
</body>
</html>
