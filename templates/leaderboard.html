<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabell | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .leaderboard-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        .rank-1 { background-color: #fffbeb !important; border-left: 5px solid gold; }
    </style>
</head>
<body>
    <div class="container mt-5" style="max-width: 500px;">
        <h3 class="fw-bold text-center">{{ group[1] }}</h3>
        <p class="text-center text-muted">Live Leaderboard</p>
        
        <div class="leaderboard-card">
            <table class="table mb-0">
                <thead class="table-dark">
                    <tr><th class="ps-3">#</th><th>Bruker</th><th class="text-end pe-3">Poeng</th></tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="{% if loop.first %}rank-1{% endif %}">
                        <td class="ps-3">{{ loop.index }}</td>
                        <td><strong>{{ row[0] }}</strong></td>
                        <td class="text-end pe-3">{{ row[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="/group/{{ group[2] }}" class="btn btn-outline-dark w-100 mt-4">ENDRE MINE TIPS</a>
    </div>
</body>
</html>
