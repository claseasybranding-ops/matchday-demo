<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabell | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #333; }
        .leaderboard-container { max-width: 500px; margin: 30px auto; padding: 20px; }
        .leaderboard-card { background: white; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table thead { background: #fdfdfd; }
        .table th { padding: 12px 15px; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; color: #888; border-bottom: 2px solid #f1f1f1; }
        .table td { padding: 12px 15px; vertical-align: middle; border-bottom: 1px solid #f8f8f8; cursor: pointer; }
        .rank-badge { width: 28px; height: 28px; background: #f1f1f1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; }
        .rank-1 .rank-badge { background: #FFD700; color: #000; }
        .points-col { font-weight: 800; text-align: right; font-size: 1rem; color: var(--md-dark); }
        .live-dot { height: 6px; width: 6px; background-color: var(--md-red); border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
        .btn-outline-custom { border: 1px solid #ddd; color: #444; font-weight: 700; border-radius: 10px; padding: 10px; background: white; font-size: 0.85rem; }
        .refresh-notice { text-align: center; font-size: 0.6rem; color: #bbb; margin-top: 15px; font-weight: 600; }

        /* Kompakt Modal */
        .modal-content { border-radius: 12px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-header { padding: 12px 20px; border-bottom: 1px solid #eee; }
        .modal-title { font-weight: 800; font-size: 1rem; }
        .match-bet-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .team-logo { width: 22px; height: 22px; object-fit: contain; margin: 0 4px; }
        .bet-score { font-weight: 800; font-size: 0.85rem; background: #f1f1f1; padding: 4px 8px; border-radius: 5px; }
        .bet-points { font-weight: 800; font-size: 0.7rem; color: white; background: var(--md-red); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-3">
            <h2 class="fw-800 mb-0" style="font-size: 1.4rem;">{{ group[1] }}</h2>
            <div class="d-flex align-items-center justify-content-center">
                <span class="live-dot"></span>
                <span class="small fw-bold text-uppercase" style="color: var(--md-red); font-size: 0.6rem; letter-spacing: 1px;">Live Leaderboard</span>
            </div>
        </div>
        
        <div class="leaderboard-card">
            <table class="table mb-0">
                <thead>
                    <tr><th style="width: 60px;">#</th><th>Deltaker</th><th class="text-end">Poeng</th></tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="{% if loop.first %}rank-1{% endif %}" onclick="openBetsModal('{{ row[0] }}')">
                        <td><div class="rank-badge">{{ loop.index }}</div></td>
                        <td><div class="fw-bold" style="font-size: 0.9rem;">{{ row[0] }}</div></td>
                        <td class="points-col">{{ row[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <div class="mt-3 text-center">
            <a href="/group/{{ group[2] }}" class="btn btn-outline-custom w-100 text-decoration-none shadow-sm">← ENDRE MINE TIPS</a>
            <p class="refresh-notice text-uppercase">Oppdateres automatisk...</p>
        </div>
    </div>

    <div class="modal fade" id="betsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm" style="max-width: 380px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tips for <span id="modalUserName" style="color:var(--md-red)"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBetsBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openBetsModal(userName) {
            document.getElementById('modalUserName').innerText = userName;
            const modalBody = document.getElementById('modalBetsBody');
            modalBody.innerHTML = '<p class="text-center text-muted small">Henter data...</p>';

            fetch(`/api/get_user_bets/{{ group[2] }}/${userName}`)
                .then(res => res.json())
                .then(bets => {
                    let html = '';
                    bets.forEach(bet => {
                        html += `
                            <div class="match-bet-row">
                                <div class="d-flex align-items-center">
                                    <img src="${bet.home_logo}" class="team-logo">
                                    <span class="fw-bold" style="font-size: 0.75rem;">${bet.home_team}</span>
                                    <span class="mx-1 text-muted">-</span>
                                    <span class="fw-bold" style="font-size: 0.75rem;">${bet.away_team}</span>
                                    <img src="${bet.away_logo}" class="team-logo">
                                </div>
                                <div class="d-flex align-items-center">
                                    <div class="bet-score">${bet.home_score}-${bet.away_score}</div>
                                    ${bet.points > 0 ? `<div class="bet-points">${bet.points}P</div>` : ''}
                                </div>
                            </div>`;
                    });
                    modalBody.innerHTML = html || '<p class="text-center small">Ingen tips registrert.</p>';
                });
            new bootstrap.Modal(document.getElementById('betsModal')).show();
        }
        setInterval(() => fetch('/api/refresh_data').then(() => location.reload()), 300000);
    </script>
</body>
</html>
