<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard | MatchDay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --md-red: #cc0000; --md-dark: #1a1a1a; --md-bg: #f8f9fa; --md-gold: #FFD700; }
        body { background-color: var(--md-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--md-dark); }
        .leaderboard-container { max-width: 500px; margin: 40px auto; padding: 20px; }
        
        /* Header */
        .live-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .live-dot { height: 8px; width: 8px; background-color: var(--md-red); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.6); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
        
        /* Prize Card */
        .prize-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 6px solid var(--md-gold); }
        .prize-icon { font-size: 2rem; margin-right: 20px; }
        
        /* Leaderboard Table */
        .leaderboard-card { background: white; border-radius: 28px; box-shadow: 0 15px 45px rgba(0,0,0,0.07); overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .table { margin-bottom: 0; border-collapse: separate; border-spacing: 0; }
        .table thead th { background: #fafafa; border-bottom: 1px solid #eee; padding: 15px 20px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        
        .user-row { cursor: pointer; transition: background 0.2s; }
        .user-row:hover { background: #fdfdfd; }
        .user-row td { padding: 18px 20px; vertical-align: middle; border-bottom: 1px solid #f8f8f8; }
        
        .rank-box { width: 32px; height: 32px; background: #f1f1f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; }
        tr:nth-child(1) .rank-box { background: var(--md-gold); color: white; }
        
        .user-name-cell { display: flex; align-items: center; gap: 10px; }
        .user-name { font-weight: 700; font-size: 1.05rem; }
        .points-display { font-weight: 800; color: var(--md-red); font-size: 1.2rem; text-align: right; }

        /* Pil / Chevron */
        .chevron { width: 20px; height: 20px; transition: transform 0.3s; color: #ccc; }
        .open .chevron { transform: rotate(180deg); color: var(--md-red); }

        /* Detaljer som glir ned */
        .details-row { display: none; background: #fafafa; }
        .details-content { padding: 20px; border-bottom: 1px solid #eee; }
        
        .bet-mini-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .team-box { width: 35%; text-align: center; }
        .team-box img { width: 25px; height: 25px; object-fit: contain; }
        .team-box span { display: block; font-size: 0.65rem; font-weight: 800; margin-top: 4px; }
        .score-box { width: 30%; text-align: center; font-weight: 800; font-size: 1.2rem; }
        
        .extra-box { background: #fff5f5; border-radius: 12px; padding: 12px; margin-top: 15px; }
        .extra-line { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 4px 0; border-bottom: 1px solid #ffebeb; }
        .extra-line:last-child { border: none; }

        .footer-info { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-4">
            <div class="live-status">
                <span class="live-dot"></span>
                <span class="fw-800 small text-uppercase" style="color: var(--md-red); letter-spacing: 1px;">Live Leaderboard</span>
            </div>
            <h1 class="fw-800">{{ group[1] }}</h1>
        </div>

        <div class="prize-card shadow-sm">
            <div class="prize-icon">🎁</div>
            <div>
                <div class="small fw-800 text-muted text-uppercase" style="font-size: 0.65rem;">Rundens Premie</div>
                <div class="fw-800 h5 m-0">{{ group[5] or 'Ære og berømmelse' }}</div>
            </div>
        </div>
        
        <div class="leaderboard-card">
            <table class="table">
                <thead>
                    <tr>
                        <th class="ps-4">Pos</th>
                        <th>Deltaker</th>
                        <th class="text-end pe-4">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="user-row" onclick="toggleDetails('{{ loop.index }}', '{{ row[0] }}')">
                        <td class="ps-4" style="width: 70px;"><div class="rank-box">{{ loop.index }}</div></td>
                        <td>
                            <div class="user-name-cell">
                                <span class="user-name">{{ row[0] }}</span>
                                <svg class="chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </td>
                        <td class="points-display pe-4">{{ row[1] }}p</td>
                    </tr>
                    <tr class="details-row" id="details-{{ loop.index }}">
                        <td colspan="3">
                            <div class="details-content" id="content-{{ loop.index }}">
                                </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <div class="footer-info">Tabellen oppdateres automatisk hvert 2. minutt</div>
    </div>

    <script>
        function toggleDetails(index, user) {
            const detailRow = document.getElementById(`details-${index}`);
            const userRow = detailRow.previousElementSibling;
            const content = document.getElementById(`content-${index}`);

            // Hvis den allerede er åpen, lukk den
            if (detailRow.style.display === 'table-row') {
                detailRow.style.display = 'none';
                userRow.classList.remove('open');
                return;
            }

            // Vis laste-spinner mens vi henter data
            detailRow.style.display = 'table-row';
            userRow.classList.add('open');
            content.innerHTML = '<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-danger"></div></div>';
            
            fetch(`/api/get_user_bets/{{ group[2] }}/${user}`)
            .then(res => res.json())
            .then(data => {
                let html = '';
                
                data.main.forEach(b => {
                    html += `
                        <div class="bet-mini-card shadow-sm">
                            <div class="team-box">
                                <img src="${b.hl}">
                                <span>${b.ht}</span>
                            </div>
                            <div class="score-box">${b.h} - ${b.a}</div>
                            <div class="team-box">
                                <img src="${b.al}">
                                <span>${b.at}</span>
                            </div>
                        </div>
                    `;
                });

                // Legg til Golden Goal og Ekstra spørsmål i en fin boks i bunnen av detaljene
                if ((data.main && data.main.length > 0) || (data.extras && data.extras.length > 0)) {
                    html += '<div class="extra-box">';
                    
                    if(data.main[0] && data.main[0].gg) {
                        html += `
                            <div class="extra-line">
                                <span class="fw-bold text-muted">Golden Goal:</span>
                                <span class="fw-800 text-danger">${data.main[0].gg}. min</span>
                            </div>
                        `;
                    }

                    data.extras.forEach(e => {
                        html += `
                            <div class="extra-line">
                                <span class="fw-bold text-muted">${e.q}</span>
                                <span class="fw-800 text-danger">${e.ans}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                content.innerHTML = html;
            });
        }

        // Auto-refresh
        setInterval(() => {
            fetch('/api/refresh_data').then(() => window.location.reload());
        }, 120000);
    </script>
</body>
</html>
