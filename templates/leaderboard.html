<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabell | {{ group[1] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; font-family: 'Plus Jakarta Sans', sans-serif; color: #333; }
        .leaderboard-container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .leaderboard-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
        .table { margin-bottom: 0; }
        .table thead { background: #f8f9fa; color: #666; }
        .table th { padding: 15px; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
        .table td { padding: 18px; vertical-align: middle; border-bottom: 1px solid #f9f9f9; }
        .rank-badge { width: 30px; height: 30px; background: #f0f0f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .rank-1 .rank-badge { background: #fff9c4; color: #827717; border: 1px solid #fbc02d; }
        .points-col { font-weight: 800; text-align: right; font-size: 1.1rem; }
        .refresh-notice { text-align: center; font-size: 0.7rem; color: #aaa; margin-top: 20px; text-transform: uppercase; }
        .btn-outline-custom { border: 2px solid #eee; color: #666; font-weight: 700; border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">{{ group[1] }}</h2>
            <div class="badge text-dark border p-2">LIVE TABELL</div>
        </div>
        
        <div class="leaderboard-card shadow-sm">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 60px;">#</th>
                        <th>Navn</th>
                        <th class="text-end">Poeng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in leaderboard %}
                    <tr class="{% if loop.first %}rank-1{% endif %}">
                        <td><div class="rank-badge">{{ loop.index }}</div></td>
                        <td><span class="fw-bold">{{ row[0] }}</span></td>
                        <td class="points-col">{{ row[1] }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" class="text-center py-5 text-muted">Venter på første tips...</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <p class="refresh-notice">Oppdateres automatisk hvert 5. minutt...</p>
        
        <div class="mt-4">
            <a href="/group/{{ group[2] }}" class="btn btn-outline-custom w-100 text-decoration-none d-block text-center">ENDRE MINE TIPS</a>
        </div>
    </div>

    <script>
        function refreshLeaderboard() {
            console.log("Sjekker for nye mål...");
            fetch('/api/refresh_data')
                .then(res => res.json())
                .then(data => {
                    location.reload(); 
                })
                .catch(err => console.log("Kunne ikke koble til server"));
        }
        setInterval(refreshLeaderboard, 300000); // 5 minutter
    </script>
</body>
</html>
